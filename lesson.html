<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest — Aula</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-guard.js"></script>
<style>
:root{--bg:#EEF4FB;--paper:#FFFDF8;--paper-line:#E8E4DF;--pink:#FF6B9D;--pink-soft:#FFE4EE;--pink-hover:#FF4F88;--blue:#6DBDE8;--blue-soft:#E3F2FD;--blue-deep:#4A9BC7;--lavender:#C4B5FD;--lavender-soft:#F0ECFF;--mint:#A7F3D0;--mint-soft:#ECFDF5;--gold:#E0A93C;--gold-soft:#FFF3D6;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);--shadow-hover:0 2px 8px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.05);
  --accent:#FF6B9D;--accent-soft:#FFE4EE;--accent-ink:#FF4F88}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);min-height:100vh;font-weight:500;-webkit-font-smoothing:antialiased;background:repeating-linear-gradient(2deg,transparent,transparent 18px,rgba(139,90,43,0.04) 18px,rgba(139,90,43,0.04) 19px),repeating-linear-gradient(-1deg,transparent,transparent 32px,rgba(101,67,33,0.03) 32px,rgba(101,67,33,0.03) 33px),linear-gradient(165deg,#F5E6D3 0%,#EDD9C0 25%,#E8D0B3 50%,#ECDCC8 75%,#F0E2D0 100%);background-attachment:fixed}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(101,67,33,0.08) 100%)}
.pixel{font-family:'Press Start 2P',monospace}
.wrap{max-width:1080px;margin:0 auto;padding:22px 20px 60px;position:relative;z-index:1}
.l-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.back-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.85);border:1px solid #E5E0DA;color:var(--pink);cursor:pointer;text-decoration:none;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.back-btn:hover{background:var(--pink);color:#fff}
.back-btn svg{width:18px;height:18px}
.l-titlewrap{flex:1;min-width:180px}
.l-crumb{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--accent-ink);text-transform:uppercase;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l-title{font-size:20px;font-weight:700;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.l-tag{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 8px;border-radius:5px;letter-spacing:.5px}
.tag-piskel{background:var(--pink-soft);color:var(--pink)}.tag-scratch{background:var(--blue-soft);color:var(--blue-deep)}.tag-roblox{background:var(--mint-soft);color:#059669}.tag-magicvoxel{background:var(--lavender-soft);color:#7C3AED}.tag-construct{background:var(--gold-soft);color:#B07D17}
.coinchip{display:inline-flex;align-items:center;gap:6px;font-family:'Press Start 2P',monospace;font-size:8px;background:var(--gold-soft);color:#B07D17;padding:8px 11px;border-radius:9px}
.coinchip svg{width:14px;height:14px}
.nb{background:var(--paper);border:1px solid #E5E0DA;border-left:3px solid rgba(139,90,43,.14);border-radius:var(--radius);box-shadow:var(--shadow)}
.l-card{padding:22px 26px;min-height:340px}
.m-h{font-size:20px;font-weight:700;margin:18px 0 8px}.m-h:first-child{margin-top:0}
.m-p{font-size:16px;color:var(--text-mid);line-height:1.65;margin-bottom:12px}
.m-tip{display:flex;gap:9px;align-items:flex-start;background:#FFF9C4;border-radius:9px;padding:11px 13px;margin:12px 0;font-size:15px;color:#7a5a10}
.m-codewrap{margin:14px 0}
.m-code-tag{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;color:var(--blue-deep);margin-bottom:5px}
.m-code{font-family:'IBM Plex Mono','Courier New',monospace;font-size:13.5px;line-height:1.6;white-space:pre-wrap;background:#0d1f3c;color:#e8f0ff;border-radius:10px;padding:14px 16px;border-left:4px solid var(--accent);overflow-x:auto}
.m-tip svg{width:19px;height:19px;flex-shrink:0;stroke:#B07D17}
.m-figure{background:#fff;border:1px solid var(--paper-line);border-radius:10px;padding:14px;text-align:center;display:inline-block;margin:6px 0}
.m-cap{font-size:13px;color:var(--text-light);margin-top:8px}
.m-embed{margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid var(--paper-line);background:#0d1f3c}
.m-embed iframe{width:100%;aspect-ratio:16/9;border:0;display:block}
.embed-ph{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#9fb3d6;text-align:center;padding:16px}
.embed-ph svg{width:34px;height:34px;stroke:#FF6B9D}
.res{display:flex;align-items:center;gap:11px;padding:13px 15px;border:1px solid var(--paper-line);border-radius:10px;text-decoration:none;color:var(--text);background:#fff;margin-bottom:9px;transition:all .15s}
.res:hover{border-color:var(--blue);background:var(--blue-soft);transform:translateY(-1px)}
.res .ic{width:22px;height:22px;flex-shrink:0}
.res .ext{width:17px;height:17px;color:var(--text-light);margin-left:auto;flex-shrink:0}
.res small{color:var(--text-light)}
.chal-box{background:var(--mint-soft);border-radius:10px;padding:14px 18px;margin:12px 0}
.chal-step{font-size:15px;color:#065f46;margin:8px 0;display:flex;gap:8px}
.chal-step b{color:#059669}
.btn-done{font-family:'IBM Plex Mono',monospace;background:var(--lavender-soft);color:#7C3AED;border:1px solid var(--lavender);border-radius:9px;padding:13px 22px;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s}
.btn-done:hover:not(.done){transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.btn-done.done{background:var(--mint);color:#065f46;border-color:var(--mint);cursor:default}
.btn-done svg{width:18px;height:18px}.btn-done img{width:16px;height:16px}
.eng-grid{display:flex;gap:12px;margin-top:8px}
.eng-col{flex:1;display:flex;flex-direction:column;gap:9px}
.chip{border:1px solid var(--paper-line);background:#fff;border-radius:9px;padding:11px 12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);transition:all .12s}
.chip:hover{border-color:var(--blue)}
.chip.sel{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-hover)}
.chip.ok{border-color:var(--mint);background:var(--mint-soft);color:#059669;cursor:default}
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.eng-msg{font-size:15px;margin-top:14px;min-height:22px}
.loading{text-align:center;padding:80px 20px;color:var(--text-light)}
.pg-chip{display:inline-block;font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;background:var(--pink-soft);color:var(--pink-hover);padding:7px 10px;border-radius:7px;margin-bottom:14px}
.pg-chip.t-teoria{background:var(--blue-soft);color:var(--blue-deep)}
.pg-chip.t-passo{background:var(--mint-soft);color:#059669}
.pg-chip.t-secao{background:var(--lavender-soft);color:#7C3AED}
.pg-title{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:12px;text-wrap:balance}
.pg-body .m-p{font-size:17px}
.pg-divider{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.pg-divider .pg-title{font-size:30px;margin-bottom:0}
.pg-open .pg-title{font-size:28px}
.pg-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:24px;padding-top:16px;border-top:1px dashed var(--paper-line)}
.pg-btn{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;border:1px solid var(--paper-line);background:#fff;color:var(--text-mid);padding:11px 16px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent-ink);transform:translateY(-1px)}
.pg-btn:disabled{opacity:.35;cursor:default}
.pg-btn.prim{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent)}
[data-theme="dark"] .pg-btn{background:#332D40}
.pg-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
.pg-dot{width:8px;height:8px;border-radius:50%;background:var(--paper-line);border:none;cursor:pointer;padding:0;transition:all .15s}
.pg-dot.on{background:var(--accent);transform:scale(1.3)}
.pg-dot.seen{background:var(--lavender)}
.pg-count{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);letter-spacing:1px;text-align:center;margin-top:10px}
.pg-page{animation:fade .25s ease;min-height:300px}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pg-page img{max-width:100%;border-radius:8px}
.eng-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 20px}
.eng-card{background:#fff;border:1px solid var(--paper-line);border-radius:11px;padding:13px 15px}
[data-theme="dark"] .eng-card{background:#332D40}
.eng-card .ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.eng-card .ec-en{font-size:17px;font-weight:700;color:var(--text)}
.eng-card .ec-phon{font-family:'Press Start 2P',monospace;font-size:6px;color:#B07D17;background:var(--gold-soft);padding:5px 7px;border-radius:6px;letter-spacing:.5px;white-space:nowrap}
.eng-card .ec-desc{font-size:13.5px;color:var(--text-mid);line-height:1.5}
.dev-seal{display:inline-flex;align-items:center;gap:10px;opacity:.8;filter:saturate(.95)}
.dev-seal svg{width:36px;height:27px;flex-shrink:0}
.dev-seal span{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;line-height:1.9;color:#B08A1E;text-align:left}
[data-theme="dark"] .dev-seal span{color:#F0C674}
.dev-seal.big{flex-direction:column;gap:12px;opacity:.95}
.dev-seal.big svg{width:72px;height:54px}
.dev-seal.big span{text-align:center;font-size:7px}
.seal-foot{display:flex;justify-content:center;margin-top:30px}
/* ---- capa (hero) na identidade do site ---- */
.hero{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 16px 44px;position:relative;overflow:hidden}
.hero>*{position:relative;z-index:1}
.conf-dec{position:absolute;inset:0;pointer-events:none;z-index:0}
.conf-dec i{position:absolute;width:12px;height:12px;border-radius:3px;opacity:.45;animation:floaty 7s ease-in-out infinite}
@keyframes floaty{50%{transform:translateY(-14px) rotate(22deg)}}
.h-num{font-family:'Press Start 2P',monospace;font-size:11px;letter-spacing:2px;color:#fff;background:var(--accent-ink);padding:12px 15px;border-radius:12px;box-shadow:var(--shadow-hover);margin-bottom:18px}
.h-kick{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:2px;color:var(--accent-ink);margin-bottom:14px}
.h-title{font-size:clamp(28px,5.6vw,54px);font-weight:700;line-height:1.08;max-width:17ch;text-wrap:balance;color:var(--text)}
.h-sub{margin-top:14px;color:var(--text-mid);font-size:clamp(15px,2.2vw,18px);max-width:52ch;line-height:1.6}
.h-tags{margin-top:16px;justify-content:center}
.cta{margin-top:26px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:17px;color:#fff;background:var(--accent-ink);border:none;border-radius:13px;padding:15px 26px;cursor:pointer;display:inline-flex;gap:10px;align-items:center;box-shadow:var(--shadow-hover);transition:.15s}
.cta:hover{transform:translateY(-2px) scale(1.02)}
.cta svg{width:20px;height:20px}
.h-meta{margin-top:22px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;color:var(--text-light);font-size:13px}
.h-meta b{color:var(--text-mid)}
.h-hint{margin-top:18px;color:var(--text-light);font-size:12px;letter-spacing:1px;animation:floaty 2.4s ease-in-out infinite}
/* ---- trilha de seções ---- */
.rail{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;margin-bottom:8px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.qtab{display:inline-flex;align-items:center;gap:9px;flex-shrink:0;padding:11px 15px;border-radius:12px;border:1px solid var(--paper-line);background:var(--paper);color:var(--text-mid);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;box-shadow:var(--shadow);transition:.15s}
.qtab:hover{border-color:var(--accent);color:var(--text)}
.qtab.on{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent)}
.qtab svg{width:17px;height:17px}
.qtab .qk{width:16px;height:16px;border-radius:50%;border:2px solid var(--paper-line);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:transparent}
.qtab.done .qk{background:var(--mint);border-color:#059669;color:#065f46}
.railprog{height:6px;border-radius:4px;background:var(--paper-line);overflow:hidden;margin:0 2px 16px}
.railprog i{display:block;height:100%;width:0;background:var(--accent);transition:.4s}
/* ---- quiz (papel) ---- */
.quiz-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.quiz-prog{flex:1;min-width:120px;height:8px;border-radius:6px;background:var(--paper-line);overflow:hidden}
.quiz-prog i{display:block;height:100%;background:var(--accent);width:0;transition:.4s}
.quiz-count{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent-ink)}
.quiz-q{font-size:21px;font-weight:700;line-height:1.35;margin:6px 0 16px;text-wrap:balance}
.opt{display:flex;align-items:center;gap:12px;text-align:left;width:100%;font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);cursor:pointer;border:1px solid var(--paper-line);background:#fff;border-radius:11px;padding:14px 16px;margin-bottom:10px;transition:.14s}
[data-theme="dark"] .opt{background:#332D40}
.opt:hover:not(:disabled){border-color:var(--accent);transform:translateX(3px)}
.opt .kx{width:28px;height:28px;flex-shrink:0;border-radius:8px;border:1px solid var(--paper-line);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text-mid)}
.opt.ok{border-color:var(--mint);background:var(--mint-soft);color:#065f46}.opt.ok .kx{background:var(--mint);border-color:#059669;color:#065f46}
.opt.no{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-hover)}.opt.no .kx{background:var(--pink);border-color:var(--pink);color:#fff}
.opt:disabled{cursor:default}
.qexp{margin-top:12px;border-radius:11px;padding:13px 15px;font-size:15px;line-height:1.55;border:1px dashed var(--paper-line);background:var(--blue-soft);display:none;color:var(--text-mid)}
.qexp.show{display:block;animation:fade .25s}
.qexp b{color:var(--accent-ink)}
.qfoot{display:flex;justify-content:flex-end;margin-top:16px}
.qbig{font-size:44px;font-weight:700;text-align:center}
/* ---- ganho de moeda ---- */
.earn{position:fixed;top:64px;right:22px;z-index:70;font-family:'Press Start 2P',monospace;font-size:10px;pointer-events:none;opacity:0}
.earn.go{animation:earn 1.3s ease forwards}
@keyframes earn{0%{opacity:0;transform:translateY(6px)}20%{opacity:1;transform:translateY(-2px)}100%{opacity:0;transform:translateY(-30px)}}
/* ---- conclusão ---- */
.cq-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(70,48,28,.42);backdrop-filter:blur(3px)}
.cq-card{position:relative;z-index:2;max-width:440px;width:100%;text-align:center;padding:34px 28px}
.cq-card h2{font-size:26px;font-weight:700;margin-bottom:6px}
.cq-card p{color:var(--text-mid);margin-bottom:18px}
.cq-tally{display:flex;gap:12px;justify-content:center;margin-bottom:22px}
.cq-tally .t{border:1px solid var(--paper-line);border-radius:12px;padding:13px 16px;min-width:96px;background:#fff}
[data-theme="dark"] .cq-tally .t{background:#332D40}
.cq-tally img{width:24px;height:24px}.cq-tally b{display:block;font-size:23px;margin-top:2px}.cq-tally small{color:var(--text-light);font-size:11px}
.cq-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#confetti{position:fixed;inset:0;z-index:61;pointer-events:none;display:none}
/* ---- tema escuro / retrô (idêntico ao resto do site) ---- */
[data-theme="dark"]{--bg:#1E1A2E;--paper:#2A2435;--paper-line:#3D3548;--pink:#FF7EB3;--pink-soft:rgba(255,126,179,.12);--pink-hover:#FF99C8;--blue:#7EC8F5;--blue-soft:rgba(126,200,245,.1);--blue-deep:#A8D8F0;--lavender:#B8A9F0;--lavender-soft:rgba(184,169,240,.1);--mint:#6EE7B7;--mint-soft:rgba(110,231,183,.08);--gold:#F0C674;--gold-soft:rgba(240,198,116,.12);--text:#E8E0F0;--text-mid:#9B8FAA;--text-light:#6B6580;--accent:#FF7EB3;--accent-soft:rgba(255,126,179,.14);--accent-ink:#FF99C8}
[data-theme="dark"] body{background:linear-gradient(165deg,#2C1E14,#22170E 50%,#2E2016)!important;background-attachment:fixed}
[data-theme="dark"] .back-btn{background:rgba(42,36,53,.85)}
[data-theme="dark"] .m-figure,[data-theme="dark"] .chip,[data-theme="dark"] .res{background:#332D40}
body.retro-dark,body.retro-light{font-family:'IBM Plex Mono',monospace}
body.retro-dark{--paper:#112244;--paper-line:#1e3a6e;--text:#e8f0ff;--text-mid:#9fb3d6;--text-light:#7a8faa;--pink:#e8477a;--pink-soft:rgba(232,71,122,.12);--pink-hover:#ff6c9a;--blue:#7ec8f5;--gold-soft:rgba(245,197,24,.14)}
body.retro-light{--paper:#fffef7;--paper-line:#1e3a6e;--text:#0d1f3c;--text-mid:#3a4a63;--text-light:#5a6a7e;--pink:#d63a6a;--gold-soft:rgba(184,134,11,.14)}
body.retro-dark,body.retro-light{background:var(--paper-line)!important}
body.retro-dark::after,body.retro-light::after{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}
body.retro-dark .nb,body.retro-light .nb,body.retro-dark .l-card,body.retro-light .l-card{border-radius:0!important;border:2px solid #1e3a6e!important;box-shadow:4px 4px 0 rgba(0,0,0,.3)!important}
body.retro-dark .h-title,body.retro-light .h-title,body.retro-dark .l-title,body.retro-light .l-title,body.retro-dark .m-h,body.retro-light .m-h,body.retro-dark .pg-title,body.retro-light .pg-title,body.retro-dark .quiz-q,body.retro-light .quiz-q{font-family:'VT323',monospace}
@media(max-width:640px){.l-card{padding:18px}.eng-cards{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<div class="earn" id="earn"></div>
<div class="wrap">
  <div class="loading" id="loading">Carregando aula…</div>
  <div id="lesson" style="display:none">
    <div class="l-head">
      <a class="back-btn" href="index.html" title="Voltar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <div class="l-titlewrap"><div class="l-crumb" id="lCrumb">—</div><div class="l-title" id="lTitle">—</div></div>
      <span class="coinchip"><img src="assets/shop/codecoin.svg" alt="CodeCoin" style="width:15px;height:15px"><span id="lCoins">0</span></span>
      <span class="coinchip" style="background:var(--lavender-soft);color:#7C3AED"><img src="assets/shop/codegem.svg" alt="CodeGem" style="width:15px;height:15px"><span id="lGems">0</span></span>
      <a class="coinchip" href="loja.html" style="text-decoration:none">🛍️ LOJA</a>

function animBlock(){let cells='';for(let i=0;i<30;i++)cells+='<div style="height:10px;border-radius:2px;background:'+((i%4)?'#1b3a63':'#FF6B9D')+';opacity:0;animation:adraw 3.2s infinite;animation-delay:'+(i*0.09)+'s"></div>';return '<div style="background:#0d1f3c;border-radius:9px;padding:14px;max-width:340px;margin:0 auto"><div style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px">'+cells+'</div><div class="pixel" style="font-size:6px;color:#7ec8f5;letter-spacing:1px;margin-top:9px">ANIMAÇÃO EXPLICATIVA</div></div><style>@keyframes adraw{0%,12%{opacity:0;transform:scale(.4)}25%,92%{opacity:1}100%{opacity:1}}</style>';}
function blockHtml(b){

  return '';
}
function renderMaterialFlat(mat,intro){let h='';if(intro)h+='<div class="m-p" style="font-size:17px;color:var(--text)">'+esc(intro)+'</div>';(mat||[]).forEach(b=>{h+=blockHtml(b);});return h||'<div class="m-p">Conteúdo em breve.</div>';}
let PAGES=[],PIDX=0;const SEEN=new Set();
function buildPages(mat,intro,title){
  const pages=[];
  if(intro)pages.push({kind:'open',title:title||'',blocks:[{t:'p',x:intro}]});
  let cur=null,mode='teoria',stepN=0;
  (mat||[]).forEach((b,i)=>{
    if(b.t==='h'){const next=(mat||[])[i+1];
      if(!next||next.t==='h'){pages.push({kind:'divider',title:b.x});mode='passo';stepN=0;cur=null;}
      else{if(mode==='passo')stepN++;cur={kind:'content',chip:mode==='passo'?('PASSO '+stepN):'TEORIA',cls:mode==='passo'?'t-passo':'t-teoria',title:b.x,blocks:[]};pages.push(cur);}
    }else{if(!cur){cur={kind:'content',chip:'',cls:'',title:'',blocks:[]};pages.push(cur);}cur.blocks.push(b);}
  });

  return pages;
}
function pageHtml(p){
  if(p.kind==='divider')return '<div class="pg-page pg-divider"><span class="pg-chip t-secao">SEÇÃO</span><div class="pg-title">'+esc(p.title)+'</div></div>';

  h+='<div class="pg-body">'+p.blocks.map(blockHtml).join('')+'</div></div>';
  return h;
}

/* ---------- quiz ---------- */
let QI=0,QScore=0,QAns=false;
function renderQuiz(){
  const Q=BODY.quiz||[];
  if(!Q.length){$('#stage').innerHTML='<div class="m-p">Atividade em breve.</div>';return;}
  if(QI>=Q.length){
    const pct=Math.round(QScore/Q.length*100);
    $('#stage').innerHTML='<div class="pg-chip t-passo">ATIVIDADE · RESULTADO</div>'+
      '<div class="qbig">'+QScore+' / '+Q.length+'</div>'+
      '<div class="m-p" style="text-align:center;margin-top:8px">'+(pct>=75?'Mandou muito bem! 🌟':pct>=50?'Boa! Vale revisar o material e voltar mais forte. 💪':'Bora revisar o material e tentar de novo! 📚')+'</div>'+
      '<div class="pg-nav" style="justify-content:center;border:none"><button class="pg-btn" id="qRetry">↻ Refazer</button><button class="pg-btn prim" id="qDes">Ir para o Desafio →</button></div>';
    $('#qRetry').onclick=()=>{QI=0;QScore=0;renderQuiz();};
    $('#qDes').onclick=()=>switchSection('des');
    return;
  }
  const q=Q[QI],L=['A','B','C','D','E'];
  let opts='';q.options.forEach((o,i)=>{opts+='<button class="opt" data-o="'+i+'"><span class="kx">'+L[i]+'</span><span>'+esc(o)+'</span></button>';});
  $('#stage').innerHTML='<div class="quiz-head"><div class="quiz-prog"><i style="width:'+(QI/Q.length*100)+'%"></i></div><div class="quiz-count">'+(QI+1)+'/'+Q.length+' · '+QScore+' ✔</div></div>'+
    '<div class="quiz-q">'+esc(q.q)+'</div>'+opts+
    '<div class="qexp" id="qexp"></div><div class="qfoot"><button class="pg-btn prim" id="qNext" style="display:none">Próxima ›</button></div>';
  QAns=false;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answerQ(+b.dataset.o,q));
  $('#qNext').onclick=()=>{QI++;renderQuiz();$('#stage').scrollIntoView({block:'start',behavior:'smooth'});};
}
function answerQ(i,q){
  if(QAns)return;QAns=true;const right=q.answer;
  document.querySelectorAll('.opt').forEach((b,bi)=>{b.disabled=true;if(bi===right)b.classList.add('ok');else if(bi===i)b.classList.add('no');});
  if(i===right)QScore++;
  const exp=$('#qexp');exp.innerHTML='<b>'+(i===right?'Isso! ✔':'Quase! ✘')+'</b> '+esc(q.explain);exp.classList.add('show');
  const Q=BODY.quiz||[];const nb=$('#qNext');nb.style.display='inline-flex';nb.textContent=(QI+1>=Q.length)?'Ver resultado ›':'Próxima ›';
  if(QI+1>=Q.length&&!FLAG.quiz){FLAG.quiz=true;markNode('atv');tryAward('award_activity',{p_lesson_id:LESSON.id,p_kind:'pratica'},5,0).then(checkDone);}
}

async function completeChallenge(){

/* ---------- inglês ---------- */
function engSource(e){if(e&&e.terms&&e.terms.length)return e.terms.map(t=>[t.en,t.pt]);return (e&&e.pairs)||[];}
function renderEnglish(){
  const e=BODY.english||{},src=engSource(e);
  if(!src.length){$('#stage').innerHTML='<div class="m-p">Atividade de inglês em breve.</div>';return;}
  let h='<div class="m-h" style="margin-top:0">English Lab</div>';
  if(e.terms&&e.terms.length){h+='<div class="m-p" style="margin-bottom:8px">As plataformas estão em inglês. Aprenda as palavras antes de começar!</div>';
    h+='<div class="eng-cards">'+e.terms.map(t=>'<div class="eng-card"><div class="ec-top"><span class="ec-en">'+esc(t.en)+'</span>'+(t.phon?'<span class="ec-phon">'+esc(t.phon)+'</span>':'')+'</div><div class="ec-desc">'+esc(t.desc||t.pt)+'</div></div>').join('')+'</div><div class="m-h">Agora pratique!</div>';}
  h+='<div class="m-p" style="margin-bottom:8px">'+esc(e.intro||'Ligue cada palavra em inglês à tradução.')+' <span id="engScore" style="color:var(--accent-ink)"></span></div>';
  h+='<div class="eng-grid"><div class="eng-col" id="engEn"></div><div class="eng-col" id="engPt"></div></div><div class="eng-msg" id="engMsg"></div>';
  $('#stage').innerHTML=h;initEnglish(e);
}
function initEnglish(e){
  const en=$('#engEn'),pt=$('#engPt'),msg=$('#engMsg'),sc=$('#engScore');if(!en||!pt)return;
  const src=engSource(e);if(!src.length)return;
  const pairs=src.map((p,i)=>({en:p[0],pt:p[1],i}));
  const order=pairs.map(p=>p.i).slice().sort(()=>0.5-((Date.now()%7)/7+Math.sin(pairs.length)));
  let matched=0,sel=null;
  const score=()=>{if(sc)sc.textContent=matched+'/'+pairs.length;};
  function chip(txt,i,col){const b=document.createElement('button');b.className='chip';b.textContent=txt;b.dataset.k=i;b.dataset.col=col;b.onclick=()=>click(b);return b;}
  pairs.forEach(p=>en.appendChild(chip(p.en,p.i,'en')));
  order.forEach(i=>pt.appendChild(chip(pairs.find(p=>p.i===i).pt,i,'pt')));
  score();
  function click(b){
    if(b.classList.contains('ok'))return;
    if(!sel){sel=b;b.classList.add('sel');return;}
    if(sel===b){b.classList.remove('sel');sel=null;return;}
    if(sel.dataset.col===b.dataset.col){sel.classList.remove('sel');sel=b;b.classList.add('sel');return;}
    if(sel.dataset.k===b.dataset.k){sel.classList.remove('sel');sel.classList.add('ok');b.classList.add('ok');sel=null;matched++;score();msg.style.color='#059669';msg.textContent='Boa! Acertou.';
      if(matched===pairs.length){msg.textContent='Perfeito! English Lab completo.';markNode('ing');tryAward('award_activity',{p_lesson_id:LESSON.id,p_kind:'english'},5,0);}}
    else{const a=sel;a.classList.add('shake');b.classList.add('shake');setTimeout(()=>{a.classList.remove('shake');b.classList.remove('shake');},360);a.classList.remove('sel');sel=null;msg.style.color='var(--pink)';msg.textContent='Quase! Tenta de novo.';}
  }
}

const SECDEF=[
  {k:'mat',label:'Material',icon:'<path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"/><path d="M9 3v18"/>',render:renderMaterial,done:'mat'},
  {k:'atv',label:'Atividade',icon:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',render:renderQuiz,done:'atv',need:()=> (BODY.quiz||[]).length},
  {k:'des',label:'Desafio',icon:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill="currentColor"/>',render:renderChallenge,done:'des'},
  {k:'ing',label:'Inglês',icon:'<path d="m5 8 6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>',render:renderEnglish,done:'ing',need:()=> engSource(BODY.english).length},
  {k:'rec',label:'Recursos',icon:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',render:renderResources,need:()=> (BODY.resources||[]).length},
];
let SECTIONS=[],CUR='mat';const DONEN={mat:1,atv:1,des:1,ing:1};
function buildRail(){
  SECTIONS=SECDEF.filter(s=>!s.need||s.need());
  $('#rail').innerHTML=SECTIONS.map(s=>'<button class="qtab" data-k="'+s.k+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+s.icon+'</svg> '+s.label+(DONEN[s.k]?'<span class="qk">✓</span>':'')+'</button>').join('');
  document.querySelectorAll('.qtab').forEach(n=>n.onclick=()=>switchSection(n.dataset.k));
}
function markNode(k){const n=document.querySelector('.qtab[data-k="'+k+'"]');if(n)n.classList.add('done');updateRailProg();}
function updateRailProg(){const tot=SECTIONS.filter(s=>DONEN[s.k]).length||1;const dn=document.querySelectorAll('.qtab.done').length;$('#railFill').style.width=Math.round(dn/tot*100)+'%';}
function switchSection(k){CUR=k;document.querySelectorAll('.qtab').forEach(n=>n.classList.toggle('on',n.dataset.k===k));const s=SECTIONS.find(x=>x.k===k)||SECTIONS[0];s.render();}

/* ---------- conclusão ---------- */
let FLAG={mat:false,quiz:false,chal:false},doneShown=false;
function checkDone(){
  const needQuiz=(BODY.quiz||[]).length>0;
  if(FLAG.mat&&FLAG.chal&&(!needQuiz||FLAG.quiz)&&!doneShown){
    doneShown=true;
    $('#tCoins').textContent=earnedCoins;$('#tGems').textContent=earnedGems;
    $('#cqSeal').innerHTML=sealSvg;$('#cqMsg').textContent='Material, atividade e desafio: tudo dominado!';
    $('#cqOverlay').style.display='flex';burstConfetti();
  }
}
function burstConfetti(){
  const c=$('#confetti'),x=c.getContext('2d');c.style.display='block';let W=c.width=innerWidth,H=c.height=innerHeight;let P=[];
  for(let i=0;i<150;i++)P.push({x:W/2,y:H*.32,vx:(Math.random()-.5)*13,vy:-6-Math.random()*9,g:.26+Math.random()*.18,s:5+Math.random()*7,c:CONF[i%CONF.length],r:Math.random()*6.28,vr:(Math.random()-.5)*.3});
  let t=0;function step(){t++;x.clearRect(0,0,W,H);P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.r);x.fillStyle=p.c;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);x.restore();});if(t<150)requestAnimationFrame(step);else c.style.display='none';}
  step();
}

/* ---------- boot ---------- */
let LESSON=null,BODY={};
function applyAccent(tool){const t=ACCENT[tool]||ACCENT._def;const r=document.documentElement.style;
  if(document.documentElement.getAttribute('data-theme')!=='dark'){r.setProperty('--accent',t.a);r.setProperty('--accent-soft',t.soft);r.setProperty('--accent-ink',t.ink);}
  return t;}
function heroDecor(){let h='';for(let i=0;i<12;i++){const c=CONF[i%CONF.length];h+='<i style="left:'+(6+Math.random()*88)+'%;top:'+(8+Math.random()*80)+'%;background:'+c+';animation-delay:'+(Math.random()*6).toFixed(1)+'s"></i>';}$('#confDec').innerHTML=h;}
function boot(lesson,progress){
  LESSON=lesson;BODY=lesson.body||{};
  const tool=lesson.tool||(lesson.module&&lesson.module.tool)||'_def';
  const t=applyAccent(tool);
  PAGES=buildPages(BODY.material,BODY.intro,lesson.title);PIDX=0;
  const modTitle=(lesson.module&&lesson.module.title)||t.label;
  $('#lCrumb').textContent=modTitle;$('#lTitle').textContent=lesson.title;
  const tags=[];if(lesson.module&&lesson.module.tool)tags.push(lesson.module.tool);if(lesson.tool&&lesson.tool!==(lesson.module&&lesson.module.tool))tags.push(lesson.tool);
  const tagsHtml=tags.map(x=>'<span class="l-tag tag-'+x+'">'+x.toUpperCase()+'</span>').join('');
  $('#lTitle').insertAdjacentHTML('afterend','');
  document.querySelector('.l-titlewrap').insertAdjacentHTML('beforeend','<div class="l-tags">'+tagsHtml+'</div>');
  // hero
  const n=lesson.position!=null?lesson.position:'';
  $('#hNum').textContent=n?('AULA '+String(n).padStart(2,'0')):'AULA';
  $('#hKick').textContent=modTitle;
  $('#hTitle').textContent=lesson.title;
  $('#hSub').textContent=lesson.description||BODY.intro||'';
  const ht=[];if(lesson.module&&lesson.module.stage)ht.push('<span class="l-tag" style="background:var(--accent-soft);color:var(--accent-ink)">'+esc(String(lesson.module.stage).toUpperCase())+'</span>');ht.push(...tags.map(x=>'<span class="l-tag tag-'+x+'">'+x.toUpperCase()+'</span>'));
  $('#hTags').innerHTML=ht.join('');
  const mm=['<span>📖 <b>'+PAGES.length+'</b> páginas</span>'];
  if((BODY.quiz||[]).length)mm.push('<span>❓ <b>'+BODY.quiz.length+'</b> perguntas</span>');
  if(engSource(BODY.english).length)mm.push('<span>🔤 <b>'+engSource(BODY.english).length+'</b> termos</span>');
  mm.push('<span>💎 desafio: <b>+2 gems</b></span>');
  $('#hMeta').innerHTML=mm.join('');
  heroDecor();
  buildRail();updateRailProg();
  $('#sealFoot').innerHTML=devSeal(false);
  if(progress==='completed'){FLAG.chal=true;markNode('des');}
  $('#loading').style.display='none';$('#lesson').style.display='block';
  $('#startBtn').onclick=()=>{$('#hero').style.display='none';$('#workspace').style.display='block';switchSection('mat');window.scrollTo({top:0});};
  document.addEventListener('keydown',e=>{if($('#workspace').style.display!=='block'||CUR!=='mat')return;if(e.key==='ArrowRight')goPage(PIDX+1);else if(e.key==='ArrowLeft')goPage(PIDX-1);});
}
async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){$('#loading').textContent='Aula não encontrada.';return;}
  let prof=null;try{prof=await window.cqAuth.getProfile();}catch(e){}
  if(prof)walletSet(prof.coins||0,prof.gems||0);
  const {data:lesson,error}=await window.sb.from('lessons').select('*, module:modules(title,tool,stage)').eq('id',id).single();
  if(error||!lesson){$('#loading').textContent='Não foi possível carregar a aula.';return;}
  let progress=null;try{const {data:pg}=await window.sb.from('lesson_progress').select('status').eq('lesson_id',id).maybeSingle();if(pg)progress=pg.status;}catch(e){}
  boot(lesson,progress);
}
load();
</script>
</body>
</html>
