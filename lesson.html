<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest — Aula</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-guard.js"></script>
<style>
:root{
  --a:#FF6B9D;--a2:#E24C86;--glow:255,107,157;
  --bg0:#0B0714;--bg1:#140C24;--panel:rgba(255,255,255,.055);--panel-b:rgba(255,255,255,.12);
  --ink:#F4EEFF;--mid:#B9AFD0;--dim:#7E7597;--ok:#34D399;--no:#FB7185;
  --gold:#F5C542;--gem:#C084FC;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'IBM Plex Mono',monospace;color:var(--ink);background:var(--bg0);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.pixel{font-family:'Press Start 2P',monospace}
#bgcanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aura{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(60% 55% at 18% 12%,rgba(var(--glow),.30),transparent 60%),
   radial-gradient(50% 50% at 88% 20%,rgba(var(--glow),.16),transparent 55%),
   radial-gradient(70% 60% at 50% 108%,rgba(var(--glow),.20),transparent 60%),
   linear-gradient(160deg,var(--bg0),var(--bg1) 55%,#0A0612)}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 3px)}
.stage{position:relative;z-index:2}

/* ---------- top bar ---------- */
.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:12px 20px;
  backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(11,7,20,.85),rgba(11,7,20,.35));border-bottom:1px solid rgba(255,255,255,.07)}
.tbtn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 13px;border-radius:11px;border:1px solid var(--panel-b);
  background:var(--panel);color:var(--ink);text-decoration:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:.15s}
.tbtn:hover{border-color:var(--a);color:#fff;box-shadow:0 0 0 1px var(--a),0 6px 20px rgba(var(--glow),.25)}
.tbtn svg{width:17px;height:17px}
.crumb{display:flex;flex-direction:column;line-height:1.25;min-width:0;flex:1}
.crumb .k{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--a);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crumb .t{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.wallet{display:flex;gap:8px;align-items:center;position:relative}
.wc{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 12px;border-radius:11px;border:1px solid var(--panel-b);background:var(--panel);font-weight:700;font-size:14px}
.wc img{width:19px;height:19px}
.wc.coin{color:var(--gold)}.wc.gem{color:var(--gem)}
.earn{position:absolute;right:8px;top:44px;font-weight:700;font-size:14px;pointer-events:none;opacity:0}
.earn.go{animation:earn 1.3s ease forwards}
@keyframes earn{0%{opacity:0;transform:translateY(6px) scale(.8)}18%{opacity:1;transform:translateY(-2px) scale(1.1)}100%{opacity:0;transform:translateY(-34px) scale(1)}}

/* ---------- hero ---------- */
.hero{min-height:calc(100vh - 63px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 22px 70px;position:relative}
.hero .num{font-family:'Press Start 2P',monospace;font-size:12px;letter-spacing:2px;color:var(--bg0);
  background:linear-gradient(135deg,var(--a),var(--a2));padding:12px 16px;border-radius:14px;box-shadow:0 10px 40px rgba(var(--glow),.5);margin-bottom:22px}
.hero .kick{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:3px;color:var(--a);margin-bottom:16px}
.hero h1{font-size:clamp(30px,6.5vw,68px);font-weight:700;line-height:1.05;letter-spacing:-1px;max-width:15ch;text-wrap:balance;
  background:linear-gradient(180deg,#fff,var(--mid));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 6px 30px rgba(var(--glow),.35))}
.hero .sub{margin-top:18px;color:var(--mid);font-size:clamp(15px,2.4vw,19px);max-width:52ch;line-height:1.6}
.hero .tags{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.tag{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;padding:8px 11px;border-radius:8px;border:1px solid var(--panel-b);background:var(--panel);color:var(--mid)}
.tag.plat{color:var(--bg0);background:linear-gradient(135deg,var(--a),var(--a2));border-color:transparent}
.cta{margin-top:34px;display:inline-flex;align-items:center;gap:12px;font-family:inherit;font-size:18px;font-weight:700;color:var(--bg0);cursor:pointer;
  border:none;border-radius:16px;padding:17px 30px;background:linear-gradient(135deg,var(--a),var(--a2));box-shadow:0 14px 44px rgba(var(--glow),.5);transition:.18s}
.cta:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 20px 60px rgba(var(--glow),.7)}
.cta svg{width:22px;height:22px}
.hero .meta{margin-top:26px;display:flex;gap:22px;flex-wrap:wrap;justify-content:center;color:var(--dim);font-size:13px}
.hero .meta b{color:var(--ink)}
.scrolldot{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:var(--dim);font-size:11px;letter-spacing:1px;animation:bob 2s ease-in-out infinite}
@keyframes bob{50%{transform:translate(-50%,6px)}}

/* ---------- workspace ---------- */
#workspace{display:none}
.rail{position:sticky;top:63px;z-index:30;display:flex;gap:8px;padding:14px 20px;overflow-x:auto;
  backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(11,7,20,.9),rgba(11,7,20,.5));border-bottom:1px solid rgba(255,255,255,.07);scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.node{display:inline-flex;align-items:center;gap:9px;flex-shrink:0;padding:10px 15px;border-radius:12px;border:1px solid var(--panel-b);
  background:var(--panel);color:var(--mid);cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;transition:.15s;position:relative}
.node:hover{color:var(--ink);border-color:var(--a)}
.node.on{color:var(--bg0);background:linear-gradient(135deg,var(--a),var(--a2));border-color:transparent;box-shadow:0 8px 26px rgba(var(--glow),.4)}
.node svg{width:17px;height:17px}
.node .chk{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.node.done .chk{background:var(--ok);border-color:var(--ok);color:#04231a}
.sec{max-width:1080px;margin:0 auto;padding:34px 22px 90px;animation:secin .4s ease}
@keyframes secin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-head .badge{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;color:var(--a);background:rgba(var(--glow),.14);padding:9px 11px;border-radius:9px}
.sec-head h2{font-size:26px;font-weight:700}
.panel{background:var(--panel);border:1px solid var(--panel-b);border-radius:20px;padding:26px 28px;backdrop-filter:blur(6px)}

/* ---------- material slides ---------- */
.slide{min-height:44vh;animation:secin .32s ease}
.chip{display:inline-block;font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;padding:8px 11px;border-radius:8px;margin-bottom:16px;color:var(--bg0)}
.chip.teoria{background:linear-gradient(135deg,#7EC8F5,#4A9BC7)}
.chip.passo{background:linear-gradient(135deg,#6EE7B7,#10B981)}
.chip.secao{background:linear-gradient(135deg,var(--a),var(--a2))}
.chip.abre{background:linear-gradient(135deg,#F5C542,#E0A93C)}
.s-title{font-size:clamp(24px,3.6vw,34px);font-weight:700;line-height:1.18;text-wrap:balance;margin-bottom:14px}
.s-body p{font-size:18px;line-height:1.7;color:var(--mid);margin-bottom:14px}
.s-tip{display:flex;gap:11px;align-items:flex-start;background:rgba(245,197,66,.1);border:1px solid rgba(245,197,66,.3);border-radius:13px;padding:14px 16px;margin:14px 0;color:#F7DE9B;font-size:15px}
.s-tip svg{width:20px;height:20px;flex-shrink:0;stroke:var(--gold)}
.s-fig{margin:16px 0;text-align:center}
.s-fig img{max-width:100%;border-radius:14px;border:1px solid var(--panel-b);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.s-cap{font-size:13px;color:var(--dim);margin-top:9px}
.code{margin:16px 0}
.code .lang{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--a);margin-bottom:6px}
.code pre{font-family:'IBM Plex Mono',monospace;font-size:14px;line-height:1.65;white-space:pre-wrap;background:#080510;color:#E8F0FF;border-radius:14px;padding:16px 18px;border-left:4px solid var(--a);overflow-x:auto}
.divider{min-height:44vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
.divider .big{font-size:clamp(28px,5vw,46px);font-weight:700;text-wrap:balance;background:linear-gradient(180deg,#fff,var(--mid));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.pgbar{display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:18px;border-top:1px solid var(--panel-b)}
.pgbtn{font-family:inherit;font-weight:700;font-size:14px;border:1px solid var(--panel-b);background:var(--panel);color:var(--ink);padding:12px 16px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.pgbtn:hover:not(:disabled){border-color:var(--a);color:#fff}
.pgbtn:disabled{opacity:.3;cursor:default}
.pgbtn.prim{background:linear-gradient(135deg,var(--a),var(--a2));color:var(--bg0);border-color:transparent}
.dots{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:50%;background:var(--panel-b);border:none;cursor:pointer;padding:0;transition:.15s}
.dot.on{background:var(--a);transform:scale(1.35);box-shadow:0 0 10px rgba(var(--glow),.8)}
.dot.seen{background:rgba(var(--glow),.5)}
.pgcount{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dim);letter-spacing:1px}

/* ---------- quiz ---------- */
.qhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.qprog{flex:1;min-width:140px;height:8px;border-radius:6px;background:var(--panel-b);overflow:hidden}
.qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--a),var(--a2));width:0;transition:.4s}
.qscore{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--a)}
.q-title{font-size:clamp(20px,3vw,27px);font-weight:700;line-height:1.3;margin:8px 0 20px;text-wrap:balance}
.opts{display:grid;gap:12px}
.opt{display:flex;align-items:center;gap:14px;text-align:left;font-family:inherit;font-size:16px;color:var(--ink);cursor:pointer;
  border:1px solid var(--panel-b);background:var(--panel);border-radius:14px;padding:16px 18px;transition:.14s}
.opt:hover:not(:disabled){border-color:var(--a);transform:translateX(3px)}
.opt .kx{width:30px;height:30px;flex-shrink:0;border-radius:9px;border:1px solid var(--panel-b);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--mid)}
.opt.ok{border-color:var(--ok);background:rgba(52,211,153,.14);color:#D6FBEA}
.opt.ok .kx{background:var(--ok);border-color:var(--ok);color:#04231a}
.opt.no{border-color:var(--no);background:rgba(251,113,133,.12);color:#FFE0E6}
.opt.no .kx{background:var(--no);border-color:var(--no);color:#3a0a12}
.opt:disabled{cursor:default}
.qexp{margin-top:16px;border-radius:14px;padding:15px 17px;font-size:15px;line-height:1.6;border:1px solid var(--panel-b);background:var(--panel);display:none}
.qexp.show{display:block;animation:secin .3s ease}
.qexp b{color:var(--a)}
.qfoot{display:flex;justify-content:flex-end;margin-top:18px}

/* ---------- desafio ---------- */
.mission .prompt{font-size:19px;line-height:1.65;color:var(--mid);margin-bottom:18px}
.steps{display:grid;gap:11px;margin-bottom:22px}
.step{display:flex;gap:13px;align-items:flex-start;background:var(--panel);border:1px solid var(--panel-b);border-radius:13px;padding:14px 16px}
.step .n{flex-shrink:0;width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--a),var(--a2));color:var(--bg0);display:flex;align-items:center;justify-content:center;font-weight:700}
.step span{font-size:15.5px;line-height:1.5;color:var(--ink)}
.done-btn{font-family:inherit;font-weight:700;font-size:17px;color:var(--bg0);border:none;border-radius:14px;padding:16px 26px;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--gem),#9333EA);box-shadow:0 12px 40px rgba(192,132,252,.4);transition:.16s}
.done-btn:hover:not(:disabled){transform:translateY(-2px)}
.done-btn.done{background:linear-gradient(135deg,var(--ok),#059669);cursor:default}
.done-btn img{width:20px;height:20px}

/* ---------- inglês ---------- */
.eng-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 22px}
.eng-card{background:var(--panel);border:1px solid var(--panel-b);border-radius:14px;padding:14px 16px}
.ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.ec-en{font-size:18px;font-weight:700;color:#fff}
.ec-phon{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);background:rgba(245,197,66,.14);padding:5px 7px;border-radius:6px;white-space:nowrap}
.ec-desc{font-size:14px;color:var(--mid);line-height:1.5}
.eng-grid{display:flex;gap:12px}
.eng-col{flex:1;display:flex;flex-direction:column;gap:10px}
.egc{border:1px solid var(--panel-b);background:var(--panel);border-radius:12px;padding:13px 14px;cursor:pointer;font-family:inherit;font-size:16px;color:var(--ink);transition:.12s}
.egc:hover{border-color:var(--a)}
.egc.sel{border-color:var(--a);background:rgba(var(--glow),.16);color:#fff}
.egc.ok{border-color:var(--ok);background:rgba(52,211,153,.14);color:#D6FBEA;cursor:default}
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.eng-msg{font-size:15px;margin-top:16px;min-height:22px}

/* ---------- resources ---------- */
.res{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid var(--panel-b);border-radius:14px;text-decoration:none;color:var(--ink);background:var(--panel);margin-bottom:12px;transition:.15s}
.res:hover{border-color:var(--a);transform:translateX(4px);box-shadow:0 8px 28px rgba(var(--glow),.2)}
.res .ic{width:24px;height:24px;flex-shrink:0;color:var(--a)}
.res b{font-size:16px}.res small{color:var(--dim);display:block;font-size:13px}
.res .ext{margin-left:auto;width:17px;height:17px;color:var(--dim)}

/* ---------- completion ---------- */
#done-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:22px;
  background:radial-gradient(60% 60% at 50% 30%,rgba(var(--glow),.25),rgba(6,4,12,.94))}
#confetti{position:absolute;inset:0}
.done-card{position:relative;z-index:2;max-width:460px;width:100%;text-align:center;background:linear-gradient(160deg,rgba(30,20,48,.96),rgba(16,10,28,.96));
  border:1px solid var(--panel-b);border-radius:24px;padding:38px 30px;box-shadow:0 30px 90px rgba(0,0,0,.6)}
.done-card .medal{width:96px;height:96px;margin:0 auto 14px;filter:drop-shadow(0 8px 24px rgba(var(--glow),.6))}
.done-card h2{font-size:30px;font-weight:700;margin-bottom:8px}
.done-card p{color:var(--mid);margin-bottom:20px}
.tally{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.tally .t{background:var(--panel);border:1px solid var(--panel-b);border-radius:14px;padding:14px 18px;min-width:96px}
.tally .t img{width:26px;height:26px}
.tally .t b{display:block;font-size:24px;margin-top:4px}
.tally .t small{color:var(--dim);font-size:11px}
.done-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.seal{display:inline-flex;flex-direction:column;align-items:center;gap:10px;opacity:.9;margin-top:8px}
.seal svg{width:60px;height:45px}
.seal span{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;line-height:1.9;color:var(--gold);text-align:center}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:15px}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--panel-b);border-top-color:var(--a);animation:sp 1s linear infinite;margin-right:12px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:640px){.eng-cards{grid-template-columns:1fr}.sec{padding:24px 16px 80px}.panel{padding:20px}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="bgcanvas"></canvas>
<div class="aura"></div>
<div class="grain"></div>

<div class="loading" id="loading"><div class="spin"></div> Carregando aula…</div>

<div class="stage" id="stage" style="display:none">
  <div class="top">
    <a class="tbtn" href="index.html" title="Voltar ao hub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
    <div class="crumb"><div class="k" id="cModule">—</div><div class="t" id="cLesson">—</div></div>
    <div class="wallet">
      <span class="wc coin"><img src="assets/shop/codecoin.svg" alt="CodeCoin"><span id="wCoins">0</span></span>
      <span class="wc gem"><img src="assets/shop/codegem.svg" alt="CodeGem"><span id="wGems">0</span></span>
      <a class="tbtn" href="loja.html" title="Loja">🛍️</a>
      <div class="earn" id="earn"></div>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="num" id="hNum">AULA</div>
    <div class="kick" id="hKick">CODE QUEST</div>
    <h1 id="hTitle">—</h1>
    <div class="sub" id="hSub"></div>
    <div class="tags" id="hTags"></div>
    <button class="cta" id="startBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Começar a aula</button>
    <div class="meta" id="hMeta"></div>
    <div class="scrolldot">▼ role para começar</div>
  </section>

  <!-- WORKSPACE -->
  <div id="workspace">
    <div class="rail" id="rail"></div>
    <div id="secStage"></div>
  </div>
</div>

<!-- COMPLETION -->
<div id="done-overlay"><canvas id="confetti"></canvas>
  <div class="done-card">
    <div class="medal" id="doneMedal"></div>
    <h2>Aula concluída! 🎉</h2>
    <p id="doneMsg">Você mandou muito bem.</p>
    <div class="tally">
      <div class="t"><img src="assets/shop/codecoin.svg" alt=""><b id="tCoins">0</b><small>CodeCoins na aula</small></div>
      <div class="t"><img src="assets/shop/codegem.svg" alt=""><b id="tGems">0</b><small>CodeGems na aula</small></div>
    </div>
    <div class="done-actions">
      <button class="tbtn" onclick="document.getElementById('done-overlay').style.display='none'">Continuar aqui</button>
      <a class="tbtn" href="index.html" style="background:linear-gradient(135deg,var(--a),var(--a2));color:var(--bg0);border-color:transparent">Voltar ao hub →</a>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const THEME={
  magicvoxel:{a:'#A855F7',a2:'#7C3AED',glow:'168,85,247',label:'MagicaVoxel'},
  roblox:{a:'#FF5A4D',a2:'#D62518',glow:'255,90,77',label:'Roblox Studio'},
  construct:{a:'#F5A623',a2:'#D9821A',glow:'245,166,35',label:'Construct'},
  scratch:{a:'#5AA9E6',a2:'#3E82C4',glow:'90,169,230',label:'Scratch'},
  piskel:{a:'#FF6B9D',a2:'#E24C86',glow:'255,107,157',label:'Piskel'},

function buildPages(mat,intro,title){

function answer(i,q){

function engSource(e){if(e&&e.terms&&e.terms.length)return e.terms.map(t=>[t.en,t.pt]);return (e&&e.pairs)||[];}
function renderEnglish(){
  const e=BODY.english||{},src=engSource(e);
  if(!src.length){$('#secStage').innerHTML='<div class="sec"><div class="panel"><p class="s-body">Atividade de inglês em breve.</p></div></div>';return;}
  let cards='';if(e.terms&&e.terms.length)cards='<div class="eng-cards">'+e.terms.map(t=>'<div class="eng-card"><div class="ec-top"><span class="ec-en">'+esc(t.en)+'</span>'+(t.phon?'<span class="ec-phon">'+esc(t.phon)+'</span>':'')+'</div><div class="ec-desc">'+esc(t.desc||t.pt)+'</div></div>').join('')+'</div>';
  $('#secStage').innerHTML='<div class="sec"><div class="sec-head"><span class="badge">INGLÊS</span><h2>English Lab</h2></div>'+
    '<div class="panel">'+(cards?'<p class="s-body" style="margin-bottom:8px">As plataformas estão em inglês. Aprenda os termos:</p>'+cards:'')+
    '<h3 style="margin:4px 0 10px">Agora ligue cada par <span id="engScore" style="color:var(--a);font-family:\'Press Start 2P\';font-size:9px"></span></h3>'+
    '<div class="eng-grid"><div class="eng-col" id="engEn"></div><div class="eng-col" id="engPt"></div></div><div class="eng-msg" id="engMsg"></div></div></div>';
  initEnglish(src);
}
function initEnglish(src){
  const en=$('#engEn'),pt=$('#engPt'),msg=$('#engMsg'),sc=$('#engScore');
  const pairs=src.map((p,i)=>({en:p[0],pt:p[1],i}));
  const order=pairs.map(p=>p.i).slice().sort(()=>0.5-((Date.now()%7)/7+Math.sin(pairs.length)));
  let matched=0,sel=null;
  const score=()=>{if(sc)sc.textContent=matched+'/'+pairs.length;};
  function chip(txt,i,col){const b=document.createElement('button');b.className='egc';b.textContent=txt;b.dataset.k=i;b.dataset.col=col;b.onclick=()=>click(b);return b;}
  pairs.forEach(p=>en.appendChild(chip(p.en,p.i,'en')));
  order.forEach(i=>pt.appendChild(chip(pairs.find(p=>p.i===i).pt,i,'pt')));
  score();
  function click(b){
    if(b.classList.contains('ok'))return;
    if(!sel){sel=b;b.classList.add('sel');return;}
    if(sel===b){b.classList.remove('sel');sel=null;return;}
    if(sel.dataset.col===b.dataset.col){sel.classList.remove('sel');sel=b;b.classList.add('sel');return;}
    if(sel.dataset.k===b.dataset.k){sel.classList.remove('sel');sel.classList.add('ok');b.classList.add('ok');sel=null;matched++;score();msg.style.color='var(--ok)';msg.textContent='Boa! Acertou.';
      if(matched===pairs.length){msg.textContent='Perfeito! English Lab completo.';FLAG.eng=true;markNode('ing');tryAward('award_activity',{p_lesson_id:LESSON.id,p_kind:'english'},5,0);}}
    else{const a=sel;a.classList.add('shake');b.classList.add('shake');setTimeout(()=>{a.classList.remove('shake');b.classList.remove('shake');},360);a.classList.remove('sel');sel=null;msg.style.color='var(--no)';msg.textContent='Quase! Tenta de novo.';}
  }
}

/* ---------- canvas bg ---------- */
function bg(){
  const c=$('#bgcanvas'),x=c.getContext('2d');let W,H,shp=[];
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;}
  rs();addEventListener('resize',rs);
  const col=getComputedStyle(document.documentElement).getPropertyValue('--glow').trim();
  for(let i=0;i<26;i++)shp.push({x:Math.random()*W,y:Math.random()*H,s:8+Math.random()*26,r:Math.random()*6.28,vr:(Math.random()-.5)*.01,vy:.15+Math.random()*.4,a:.04+Math.random()*.09});
  function draw(){
    x.clearRect(0,0,W,H);
    shp.forEach(p=>{p.y-=p.vy;p.r+=p.vr;if(p.y<-40){p.y=H+30;p.x=Math.random()*W;}
      x.save();x.translate(p.x,p.y);x.rotate(p.r);x.strokeStyle='rgba('+col+','+p.a+')';x.lineWidth=1.4;x.strokeRect(-p.s/2,-p.s/2,p.s,p.s);x.restore();});
    if(!reduce)requestAnimationFrame(draw);
  }
  draw();
}
function burstConfetti(){
  const c=$('#confetti'),x=c.getContext('2d');let W=c.width=innerWidth,H=c.height=innerHeight;
  const cols=['#F5C542','#C084FC','#FF6B9D','#34D399','#22D3EE'];let P=[];
  for(let i=0;i<160;i++)P.push({x:W/2,y:H*.3,vx:(Math.random()-.5)*14,vy:-6-Math.random()*10,g:.28+Math.random()*.2,s:5+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6.28,vr:(Math.random()-.5)*.3});
  let t=0;function step(){t++;x.clearRect(0,0,W,H);P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.r);x.fillStyle=p.c;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);x.restore();});if(t<150)requestAnimationFrame(step);}
  step();
}

}
function boot(lesson,progress){

  const t=applyTheme();
  PAGES=buildPages(BODY.material,BODY.intro,lesson.title);
  const n=lesson.position!=null?lesson.position:'';
  $('#hNum').textContent=n?('AULA '+String(n).padStart(2,'0')):'AULA';
  $('#hKick').textContent=((lesson.module&&lesson.module.title)||t.label);
  $('#cModule').textContent=(lesson.module&&lesson.module.title)||t.label;
  $('#cLesson').textContent=lesson.title;
  $('#hTitle').textContent=lesson.title;
  $('#hSub').textContent=lesson.description||BODY.intro||'';
  const tags=['<span class="tag plat">'+esc((t.label||'').toUpperCase())+'</span>'];
  if(lesson.module&&lesson.module.stage)tags.unshift('<span class="tag">'+esc(String(lesson.module.stage).toUpperCase())+'</span>');
  $('#hTags').innerHTML=tags.join('');
  const mm=[];mm.push('<span>📖 <b>'+PAGES.length+'</b> páginas</span>');
  if((BODY.quiz||[]).length)mm.push('<span>❓ <b>'+BODY.quiz.length+'</b> perguntas</span>');
  if(engSource(BODY.english).length)mm.push('<span>🔤 <b>'+engSource(BODY.english).length+'</b> termos</span>');
  mm.push('<span>💎 desafio: <b>+2 gems</b></span>');
  $('#hMeta').innerHTML=mm.join('');
  buildRail();
  if(progress==='completed'){FLAG.chal=true;markNode('des');}
  $('#loading').style.display='none';$('#stage').style.display='block';
  bg();
  $('#startBtn').onclick=()=>{
    $('#hero').style.display='none';$('#workspace').style.display='block';
    switchSection('mat');window.scrollTo({top:0});
  };
  document.addEventListener('keydown',e=>{
    if($('#workspace').style.display!=='block'||CUR!=='mat')return;
    if(e.key==='ArrowRight')go(PIDX+1);else if(e.key==='ArrowLeft')go(PIDX-1);
  });
}

async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){$('#loading').textContent='Aula não encontrada.';return;}
  let prof=null;try{prof=await window.cqAuth.getProfile();}catch(e){}
  if(prof)walletSet(prof.coins||0,prof.gems||0);
  const {data:lesson,error}=await window.sb.from('lessons').select('*, module:modules(title,tool,stage)').eq('id',id).single();
  if(error||!lesson){$('#loading').textContent='Não foi possível carregar a aula.';return;}
  let progress=null;
  try{const {data:pg}=await window.sb.from('lesson_progress').select('status').eq('lesson_id',id).maybeSingle();if(pg)progress=pg.status;}catch(e){}
  boot(lesson,progress);
}
load();
</script>
</body>
</html>
