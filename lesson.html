<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest — Aula</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-guard.js"></script>
<style>
:root{--bg:#EEF4FB;--paper:#FFFDF8;--paper-line:#E8E4DF;--pink:#FF6B9D;--pink-soft:#FFE4EE;--pink-hover:#FF4F88;--blue:#6DBDE8;--blue-soft:#E3F2FD;--blue-deep:#4A9BC7;--lavender:#C4B5FD;--lavender-soft:#F0ECFF;--mint:#A7F3D0;--mint-soft:#ECFDF5;--gold:#E0A93C;--gold-soft:#FFF3D6;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);--shadow-hover:0 2px 8px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.05)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);min-height:100vh;font-weight:500;-webkit-font-smoothing:antialiased;background:repeating-linear-gradient(2deg,transparent,transparent 18px,rgba(139,90,43,0.04) 18px,rgba(139,90,43,0.04) 19px),repeating-linear-gradient(-1deg,transparent,transparent 32px,rgba(101,67,33,0.03) 32px,rgba(101,67,33,0.03) 33px),linear-gradient(165deg,#F5E6D3 0%,#EDD9C0 25%,#E8D0B3 50%,#ECDCC8 75%,#F0E2D0 100%);background-attachment:fixed}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(101,67,33,0.08) 100%)}
.pixel{font-family:'Press Start 2P',monospace}
.wrap{max-width:1000px;margin:0 auto;padding:24px 20px 48px;position:relative;z-index:1}
.l-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.back-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.85);border:1px solid #E5E0DA;color:var(--pink);cursor:pointer;text-decoration:none;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.back-btn:hover{background:var(--pink);color:#fff}
.back-btn svg{width:18px;height:18px}
.l-titlewrap{flex:1;min-width:180px}
.l-title{font-size:24px;font-weight:700;line-height:1.1}
.l-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.l-tag{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 8px;border-radius:5px;letter-spacing:.5px}
.tag-piskel{background:var(--pink-soft);color:var(--pink)}.tag-scratch{background:var(--blue-soft);color:var(--blue-deep)}.tag-roblox{background:var(--mint-soft);color:#059669}.tag-magicvoxel{background:var(--lavender-soft);color:#7C3AED}.tag-construct{background:var(--gold-soft);color:#B07D17}
.coinchip{display:inline-flex;align-items:center;gap:6px;font-family:'Press Start 2P',monospace;font-size:8px;background:var(--gold-soft);color:#B07D17;padding:8px 11px;border-radius:9px}
.coinchip svg{width:14px;height:14px}
.l-body{display:flex;gap:16px;align-items:flex-start}
.l-side{width:172px;flex-shrink:0}
.nb{background:var(--paper);border:1px solid #E5E0DA;border-left:3px solid rgba(139,90,43,.14);border-radius:var(--radius);box-shadow:var(--shadow)}
.side-nav{padding:8px}
.snav{display:flex;align-items:center;gap:9px;width:100%;border:none;background:none;padding:10px 11px;border-radius:9px;cursor:pointer;color:var(--text-mid);font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;text-align:left}
.snav:hover{background:var(--blue-soft)}
.snav.on{background:var(--pink-soft);color:var(--pink-hover)}
.snav svg{width:18px;height:18px;flex-shrink:0}
.side-prog{margin-top:10px;padding:11px 13px}
.side-prog .pixel{font-size:6px;color:#7C3AED;letter-spacing:1px}
.prog-bar{height:7px;background:#fff;border-radius:4px;margin:7px 0 5px;overflow:hidden;border:1px solid var(--paper-line)}
.prog-fill{height:100%;background:var(--lavender);width:0;transition:width .4s}
.l-main{flex:1;min-width:0}
.l-card{padding:20px 24px;min-height:320px}
.pane{display:none;animation:fade .25s ease}
.pane.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.m-h{font-size:20px;font-weight:700;margin:18px 0 8px}.m-h:first-child{margin-top:0}
.m-p{font-size:16px;color:var(--text-mid);line-height:1.65;margin-bottom:12px}
.m-tip{display:flex;gap:9px;align-items:flex-start;background:#FFF9C4;border-radius:9px;padding:11px 13px;margin:12px 0;font-size:15px;color:#7a5a10}
.m-codewrap{margin:14px 0}
.m-code-tag{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;color:var(--blue-deep);margin-bottom:5px}
.m-code{font-family:'IBM Plex Mono','Courier New',monospace;font-size:13.5px;line-height:1.6;white-space:pre-wrap;background:#0d1f3c;color:#e8f0ff;border-radius:10px;padding:14px 16px;border-left:4px solid var(--pink);overflow-x:auto}
.m-tip svg{width:19px;height:19px;flex-shrink:0;stroke:#B07D17}
.m-figure{background:#fff;border:1px solid var(--paper-line);border-radius:10px;padding:14px;text-align:center;display:inline-block;margin:6px 0}
.m-cap{font-size:13px;color:var(--text-light);margin-top:8px}
.m-embed{margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid var(--paper-line);background:#0d1f3c}
.m-embed iframe{width:100%;aspect-ratio:16/9;border:0;display:block}
.embed-ph{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#9fb3d6;text-align:center;padding:16px}
.embed-ph svg{width:34px;height:34px;stroke:#FF6B9D}
.res{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--paper-line);border-radius:10px;text-decoration:none;color:var(--text);background:#fff;margin-bottom:9px;transition:all .15s}
.res:hover{border-color:var(--blue);background:var(--blue-soft);transform:translateY(-1px)}
.res .ic{width:22px;height:22px;flex-shrink:0}
.res .ext{width:17px;height:17px;color:var(--text-light);margin-left:auto;flex-shrink:0}
.res small{color:var(--text-light)}
.chal-box{background:var(--mint-soft);border-radius:10px;padding:12px 16px;margin:12px 0}
.chal-step{font-size:15px;color:#065f46;margin:6px 0;display:flex;gap:8px}
.chal-step b{color:#059669}
.btn-done{font-family:'IBM Plex Mono',monospace;background:var(--pink-soft);color:var(--pink-hover);border:none;border-radius:9px;padding:12px 22px;font-size:17px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s}
.btn-done:hover{transform:translateY(-1px)}
.btn-done.done{background:var(--mint);color:#065f46;cursor:default}
.btn-done svg{width:18px;height:18px}
.eng-grid{display:flex;gap:12px;margin-top:8px}
.eng-col{flex:1;display:flex;flex-direction:column;gap:9px}
.chip{border:1px solid var(--paper-line);background:#fff;border-radius:9px;padding:11px 12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);transition:all .12s}
.chip:hover{border-color:var(--blue)}
.chip.sel{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-hover)}
.chip.ok{border-color:var(--mint);background:var(--mint-soft);color:#059669;cursor:default}
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.eng-msg{font-size:15px;margin-top:14px;min-height:22px}
.loading{text-align:center;padding:60px 20px;color:var(--text-light)}
/* ---- material paginado (uma ideia por página, estilo CourseFabric) ---- */
.pg-chip{display:inline-block;font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;background:var(--pink-soft);color:var(--pink-hover);padding:7px 10px;border-radius:7px;margin-bottom:12px}
.pg-chip.t-teoria{background:var(--blue-soft);color:var(--blue-deep)}
.pg-chip.t-passo{background:var(--mint-soft);color:#059669}
.pg-chip.t-secao{background:var(--lavender-soft);color:#7C3AED}
.pg-title{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:12px;text-wrap:balance}
.pg-body .m-p{font-size:17px}
.pg-divider{min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.pg-divider .pg-title{font-size:30px;margin-bottom:0}
.pg-open .pg-title{font-size:28px}
.pg-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:22px;padding-top:14px;border-top:1px dashed var(--paper-line)}
.pg-btn{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;border:1px solid var(--paper-line);background:#fff;color:var(--text-mid);padding:10px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--pink);color:var(--pink-hover);transform:translateY(-1px)}
.pg-btn:disabled{opacity:.35;cursor:default}
[data-theme="dark"] .pg-btn{background:#332D40}
.pg-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
.pg-dot{width:8px;height:8px;border-radius:50%;background:var(--paper-line);border:none;cursor:pointer;padding:0;transition:all .15s}
.pg-dot.on{background:var(--pink);transform:scale(1.3)}
.pg-count{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);letter-spacing:1px;text-align:center;margin-top:8px}
.pg-page{animation:fade .25s ease;min-height:250px}
.pg-page img{max-width:100%;border-radius:8px}
/* ---- English Lab: cards de termos com fonética (estilo CourseFabric) ---- */
.eng-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 20px}
.eng-card{background:#131C33;border:1px solid #26324D;border-radius:11px;padding:13px 15px}
.eng-card .ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.eng-card .ec-en{font-size:17px;font-weight:700;color:#fff}
.eng-card .ec-phon{font-family:'Press Start 2P',monospace;font-size:6px;color:#F5D76E;background:rgba(245,215,110,.14);padding:5px 7px;border-radius:6px;letter-spacing:.5px;white-space:nowrap}
.eng-card .ec-desc{font-size:13.5px;color:#9fb3d6;line-height:1.5}
@media(max-width:720px){.eng-cards{grid-template-columns:1fr}}
/* ---- selo de autoria (dourado, retrô) ---- */
.dev-seal{display:inline-flex;align-items:center;gap:10px;opacity:.8;filter:saturate(.95)}
.dev-seal svg{width:36px;height:27px;flex-shrink:0}
.dev-seal span{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;line-height:1.9;color:#B08A1E;text-align:left}
[data-theme="dark"] .dev-seal span{color:#F0C674}
.dev-seal.big{flex-direction:column;gap:12px;opacity:.95}
.dev-seal.big svg{width:72px;height:54px}
.dev-seal.big span{text-align:center;font-size:7px}
.seal-foot{display:flex;justify-content:center;margin-top:30px}
[data-theme="dark"]{--bg:#1E1A2E;--paper:#2A2435;--paper-line:#3D3548;--pink:#FF7EB3;--pink-soft:rgba(255,126,179,.12);--pink-hover:#FF99C8;--blue:#7EC8F5;--blue-soft:rgba(126,200,245,.1);--blue-deep:#A8D8F0;--lavender:#B8A9F0;--lavender-soft:rgba(184,169,240,.1);--mint:#6EE7B7;--mint-soft:rgba(110,231,183,.08);--gold:#F0C674;--gold-soft:rgba(240,198,116,.12);--text:#E8E0F0;--text-mid:#9B8FAA;--text-light:#6B6580}
[data-theme="dark"] body{background:linear-gradient(165deg,#2C1E14,#22170E 50%,#2E2016)!important;background-attachment:fixed}
[data-theme="dark"] .back-btn{background:rgba(42,36,53,.85)}
[data-theme="dark"] .m-figure,[data-theme="dark"] .chip{background:#332D40}
body.retro-dark,body.retro-light{font-family:'IBM Plex Mono',monospace}
body.retro-dark{--paper:#112244;--paper-line:#1e3a6e;--text:#e8f0ff;--text-mid:#9fb3d6;--text-light:#7a8faa;--pink:#e8477a;--pink-soft:rgba(232,71,122,.12);--pink-hover:#ff6c9a;--blue:#7ec8f5;--gold-soft:rgba(245,197,24,.14)}
body.retro-light{--paper:#fffef7;--paper-line:#1e3a6e;--text:#0d1f3c;--text-mid:#3a4a63;--text-light:#5a6a7e;--pink:#d63a6a;--gold-soft:rgba(184,134,11,.14)}
body.retro-dark,body.retro-light{background:var(--paper-line)!important}
body.retro-dark::after,body.retro-light::after{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}
body.retro-dark .nb,body.retro-light .nb,body.retro-dark .l-card,body.retro-light .l-card{border-radius:0!important;border:2px solid #1e3a6e!important;box-shadow:4px 4px 0 rgba(0,0,0,.3)!important}
body.retro-dark .l-title,body.retro-light .l-title,body.retro-dark .m-h,body.retro-light .m-h{font-family:'VT323',monospace}
@media(max-width:720px){.l-body{flex-direction:column}.l-side{width:100%}.side-nav{display:flex;flex-wrap:wrap}.snav{width:auto}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading" id="loading">Carregando aula…</div>
  <div id="lesson" style="display:none">
    <div class="l-head">
      <a class="back-btn" href="index.html" title="Voltar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <div class="l-titlewrap">
        <div class="l-title" id="lTitle">—</div>
        <div class="l-tags" id="lTags"></div>
      </div>
      <span class="coinchip"><img src="assets/shop/codecoin.svg" alt="CodeCoin" style="width:15px;height:15px"><span id="lCoins">0</span></span>
      <span class="coinchip" style="background:var(--lavender-soft);color:#7C3AED"><img src="assets/shop/codegem.svg" alt="CodeGem" style="width:15px;height:15px"><span id="lGems">0</span></span>
      <a class="coinchip" href="loja.html" style="text-decoration:none">🛍️ LOJA</a>
    </div>
    <div class="l-body">
      <div class="l-side">
        <div class="nb side-nav">
          <button class="snav on" data-tab="mat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"/><path d="M9 3v18"/></svg> Material</button>
          <button class="snav" data-tab="rec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg> Recursos</button>
          <button class="snav" data-tab="des"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg> Desafio</button>
          <button class="snav" data-tab="ing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg> Inglês</button>
          <button class="snav" data-tab="atv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Atividade</button>
        </div>
        <div class="nb side-prog">
          <div class="pixel">PROGRESSO</div>
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
          <div style="font-size:13px;color:var(--text-mid)" id="progTxt">Em andamento</div>
        </div>
      </div>
      <div class="l-main">
        <div class="nb l-card">
          <div class="pane on" id="pane-mat"></div>
          <div class="pane" id="pane-rec"></div>
          <div class="pane" id="pane-des"></div>
          <div class="pane" id="pane-ing"></div>
          <div class="pane" id="pane-atv"></div>
        </div>
      </div>
    </div>
    <div class="seal-foot" id="sealFoot"></div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

(function(){
  function isDark(t){return t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);}
  let t='light';try{t=JSON.parse(localStorage.getItem('cq_theme'))||'light';}catch(e){}
  document.documentElement.setAttribute('data-theme',isDark(t)?'dark':'light');
  let retro=false;try{retro=JSON.parse(localStorage.getItem('cq_retro'))||false;}catch(e){}
  if(retro)document.body.classList.add(isDark(t)?'retro-dark':'retro-light');
})();

const tipSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2Z"/></svg>';
const extSvg='<svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>';
const resIcons={
  piskel:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#FF6B9D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>',
  scratch:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#4A9BC7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 4 12l5 5M15 7l5 5-5 5"/></svg>',
  link:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  image:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>'
};
const playSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 8 6 4-6 4z"/></svg>';

function ytEmbed(url){
  const m=String(url).match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([\w-]{6,})/);
  return m?('https://www.youtube.com/embed/'+m[1]):null;
}
function blockHtml(b){
  if(b.t==='h')return '<div class="m-h">'+esc(b.x)+'</div>';
  if(b.t==='p')return '<div class="m-p">'+esc(b.x)+'</div>';
  if(b.t==='tip')return '<div class="m-tip">'+tipSvg+'<span>'+esc(b.x)+'</span></div>';
  if(b.t==='code')return '<div class="m-codewrap"><div class="m-code-tag">'+esc(b.lang||'BLOCOS DO SCRATCH')+'</div><pre class="m-code">'+(b.lines||[]).map(esc).join('\n')+'</pre>'+(b.cap?'<div class="m-cap" style="text-align:left;margin-top:6px">'+esc(b.cap)+'</div>':'')+'</div>';
  if(b.t==='img')return '<div class="m-figure">'+(b.svg||(b.url?'<img src="'+esc(b.url)+'" style="max-width:100%;border-radius:6px" loading="lazy">':''))+(b.cap?'<div class="m-cap">'+esc(b.cap)+'</div>':'')+'</div>';
  if(b.t==='anim')return '<div class="m-figure" style="display:block">'+animBlock()+(b.cap?'<div class="m-cap">'+esc(b.cap)+'</div>':'')+'</div>';
  if(b.t==='embed'){
    const yt=ytEmbed(b.url||'');let h='';
    if(yt)h='<div class="m-embed"><iframe src="'+esc(yt)+'" allowfullscreen loading="lazy"></iframe></div>';
    else if(b.url)h='<div class="m-embed"><div class="embed-ph">'+playSvg+'<a href="'+esc(b.url)+'" target="_blank" style="color:#7ec8f5">Abrir vídeo</a></div></div>';
    else h='<div class="m-embed"><div class="embed-ph">'+playSvg+'<div>Espaço para vídeo curto (YouTube/TikTok/Insta)</div><div style="font-size:12px;opacity:.7">o tutor adiciona o link</div></div></div>';
    if(b.cap)h+='<div class="m-cap" style="margin-top:-4px">'+esc(b.cap)+'</div>';
    return h;
  }
  return '';
}
function renderMaterial(mat,intro){
  let h='';
  if(intro)h+='<div class="m-p" style="font-size:17px;color:var(--text)">'+esc(intro)+'</div>';
  (mat||[]).forEach(b=>{h+=blockHtml(b);});
  return h||'<div class="m-p">Conteúdo em breve.</div>';
}

/* ---- selo de autoria ---- */
const sealSvg='<svg viewBox="0 0 64 48" fill="none" aria-hidden="true"><defs><linearGradient id="gsl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F5D76E"/><stop offset="1" stop-color="#C9A227"/></linearGradient></defs><path fill="#C9A227" opacity=".5" d="M10 30h4v-4h4v-4h4v4h-4v4h-4v4h-4zM54 30h-4v-4h-4v-4h-4v4h4v4h4v4h4z"/><path fill="url(#gsl)" d="M32 6l6 10-6 10-6-10z"/><path fill="url(#gsl)" opacity=".85" d="M23 28l4 7h-8zM41 28l4 7h-8z"/><rect x="30" y="30" width="4" height="4" fill="#7C3AED"/><rect x="18" y="10" width="2" height="2" fill="#F5D76E"/><rect x="45" y="13" width="2" height="2" fill="#F5D76E"/><rect x="32" y="40" width="2" height="2" fill="#F5D76E" opacity=".8"/></svg>';
function devSeal(big){
  return '<div class="dev-seal'+(big?' big':'')+'">'+sealSvg+'<span>DESENVOLVIDO POR<br>MATHEUS MARQUES</span></div>';
}

/* ---- material paginado: uma ideia por página ---- */
let PAGES=[],PIDX=0;
function buildPages(mat,intro,title){
  const pages=[];
  if(intro)pages.push({kind:'open',title:title||'',blocks:[{t:'p',x:intro}]});
  let cur=null,mode='teoria',stepN=0;
  (mat||[]).forEach((b,i)=>{
    if(b.t==='h'){
      const next=(mat||[])[i+1];
      if(!next||next.t==='h'){pages.push({kind:'divider',title:b.x});mode='passo';stepN=0;cur=null;}
      else{
        if(mode==='passo')stepN++;
        cur={kind:'content',chip:mode==='passo'?('PASSO '+stepN):'TEORIA',cls:mode==='passo'?'t-passo':'t-teoria',title:b.x,blocks:[]};
        pages.push(cur);
      }
    }else{
      if(!cur){cur={kind:'content',chip:'',cls:'',title:'',blocks:[]};pages.push(cur);}
      cur.blocks.push(b);
    }
  });
  pages.push({kind:'seal'});
  return pages;
}
function pageHtml(p){
  if(p.kind==='divider')return '<div class="pg-page pg-divider"><span class="pg-chip t-secao">SEÇÃO</span><div class="pg-title">'+esc(p.title)+'</div></div>';
  if(p.kind==='seal')return '<div class="pg-page pg-divider"><div class="pg-title">Material concluído! 🎉</div><div class="m-p" style="text-align:center">Agora vá para o <b>Desafio</b> e mostre o que aprendeu.</div>'+devSeal(true)+'</div>';
  let h='<div class="pg-page'+(p.kind==='open'?' pg-open':'')+'">';
  if(p.kind==='open')h+='<span class="pg-chip">A AULA DE HOJE</span>';
  else if(p.chip)h+='<span class="pg-chip '+p.cls+'">'+esc(p.chip)+'</span>';
  if(p.title)h+='<div class="pg-title">'+esc(p.title)+'</div>';
  h+='<div class="pg-body">'+p.blocks.map(blockHtml).join('')+'</div></div>';
  return h;
}
function renderPager(){
  const total=PAGES.length;
  let dots='';for(let i=0;i<total;i++)dots+='<button class="pg-dot'+(i===PIDX?' on':'')+'" data-p="'+i+'" aria-label="Página '+(i+1)+'"></button>';
  $('#pane-mat').innerHTML=pageHtml(PAGES[PIDX])+
    '<div class="pg-nav"><button class="pg-btn" id="pgPrev" '+(PIDX===0?'disabled':'')+'>‹ Anterior</button>'+
    '<div class="pg-dots">'+dots+'</div>'+
    '<button class="pg-btn" id="pgNext" '+(PIDX===total-1?'disabled':'')+'>Próxima ›</button></div>'+
    '<div class="pg-count">'+(PIDX+1)+' / '+total+'</div>';
  const pv=$('#pgPrev'),nx=$('#pgNext');
  if(pv)pv.onclick=()=>{if(PIDX>0){PIDX--;renderPager();}};
  if(nx)nx.onclick=()=>{if(PIDX<total-1){PIDX++;renderPager();}};
  document.querySelectorAll('.pg-dot').forEach(d=>d.onclick=()=>{PIDX=+d.dataset.p;renderPager();});
  awardCurrentPage();
}
function initPager(mat,intro,title){
  if(!mat||!mat.length){$('#pane-mat').innerHTML=renderMaterial(mat,intro);return;}
  PAGES=buildPages(mat,intro,title);PIDX=0;renderPager();
  document.addEventListener('keydown',e=>{
    if(!$('#pane-mat').classList.contains('on'))return;
    if(e.key==='ArrowRight'&&PIDX<PAGES.length-1){PIDX++;renderPager();}
    else if(e.key==='ArrowLeft'&&PIDX>0){PIDX--;renderPager();}
  });
}
function animBlock(){
  let cells='';for(let i=0;i<30;i++)cells+='<div style="height:10px;border-radius:2px;background:'+((i%4)?'#1b3a63':'#FF6B9D')+';opacity:0;animation:adraw 3.2s infinite;animation-delay:'+(i*0.09)+'s"></div>';
  return '<div style="background:#0d1f3c;border-radius:9px;padding:14px;max-width:340px;margin:0 auto"><div style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px">'+cells+'</div><div class="pixel" style="font-size:6px;color:#7ec8f5;letter-spacing:1px;margin-top:9px">ANIMAÇÃO EXPLICATIVA</div></div><style>@keyframes adraw{0%,12%{opacity:0;transform:scale(.4)}25%,92%{opacity:1}100%{opacity:1}}</style>';
}
function renderResources(rs){
  if(!rs||!rs.length)return '<div class="m-p">Sem recursos por enquanto.</div>';
  let h='<div class="m-h" style="margin-top:0">Tudo que essa aula precisa</div>';
  rs.forEach(r=>{h+='<a class="res" href="'+esc(r.url||'#')+'" target="_blank" rel="noopener">'+(resIcons[r.kind]||resIcons.link)+'<span>'+esc(r.label)+(r.note?' <small>— '+esc(r.note)+'</small>':'')+'</span>'+extSvg+'</a>';});
  return h;
}
function renderChallenge(c,reward){
  if(!c||!c.x)return '<div class="m-p">Desafio em breve.</div>';
  let h='<div class="m-h" style="margin-top:0">Desafio: faça sozinho!</div><div class="m-p">'+esc(c.x)+'</div>';
  if(c.steps&&c.steps.length){h+='<div class="chal-box">';c.steps.forEach((s,i)=>{h+='<div class="chal-step"><b>'+(i+1)+'.</b> '+esc(s)+'</div>';});h+='</div>';}
  h+='<button class="btn-done" id="btnDone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L19 7"/></svg> Concluir desafio (+2 <img src="assets/shop/codegem.svg" style="width:15px;height:15px;vertical-align:-2px">)</button>';
  return h;
}
function engSource(e){
  if(e&&e.terms&&e.terms.length)return e.terms.map(t=>[t.en,t.pt]);
  return (e&&e.pairs)||[];
}
function renderEnglish(e){
  const src=engSource(e);
  if(!src.length)return '<div class="m-p">Atividade de inglês em breve.</div>';
  let h='<div class="m-h" style="margin-top:0">English Lab</div>';
  if(e.terms&&e.terms.length){
    h+='<div class="m-p" style="margin-bottom:8px">As plataformas estão em inglês. Aprenda as palavras antes de começar!</div>';
    h+='<div class="eng-cards">'+e.terms.map(t=>'<div class="eng-card"><div class="ec-top"><span class="ec-en">'+esc(t.en)+'</span>'+(t.phon?'<span class="ec-phon">'+esc(t.phon)+'</span>':'')+'</div><div class="ec-desc">'+esc(t.desc||t.pt)+'</div></div>').join('')+'</div>';
    h+='<div class="m-h">Agora pratique!</div>';
  }
  h+='<div class="m-p" style="margin-bottom:8px">'+esc(e.intro||'Ligue cada palavra em inglês à tradução.')+' <span id="engScore" style="color:var(--pink)"></span></div>';
  h+='<div class="eng-grid"><div class="eng-col" id="engEn"></div><div class="eng-col" id="engPt"></div></div><div class="eng-msg" id="engMsg"></div>';
  return h;
}
function initEnglish(e){
  const en=$('#engEn'),pt=$('#engPt'),msg=$('#engMsg'),sc=$('#engScore');
  if(!en||!pt)return;
  const src=engSource(e);if(!src.length)return;
  const pairs=src.map((p,i)=>({en:p[0],pt:p[1],i}));
  const order=pairs.map(p=>p.i).slice().sort(()=>0.5-((Date.now()%7)/7+Math.sin(pairs.length)));
  let matched=0,sel=null;
  function score(){if(sc)sc.textContent=matched+'/'+pairs.length;}
  function chip(txt,i,col){const b=document.createElement('button');b.className='chip';b.textContent=txt;b.dataset.k=i;b.dataset.col=col;b.onclick=()=>click(b);return b;}
  pairs.forEach(p=>en.appendChild(chip(p.en,p.i,'en')));
  order.forEach(i=>pt.appendChild(chip(pairs.find(p=>p.i===i).pt,i,'pt')));
  score();
  function click(b){
    if(b.classList.contains('ok'))return;
    if(!sel){sel=b;b.classList.add('sel');return;}
    if(sel===b){b.classList.remove('sel');sel=null;return;}
    if(sel.dataset.col===b.dataset.col){sel.classList.remove('sel');sel=b;b.classList.add('sel');return;}
    if(sel.dataset.k===b.dataset.k){sel.classList.remove('sel');sel.classList.add('ok');b.classList.add('ok');sel=null;matched++;score();msg.style.color='#059669';msg.textContent='Boa! Acertou.';
      if(matched===pairs.length){msg.textContent='Perfeito! Você completou a atividade de inglês.';
        if(LESSON)tryAward('award_activity',{p_lesson_id:LESSON.id,p_kind:'english'}).then(novo=>{if(novo)msg.textContent='Perfeito! Atividade de inglês completa: +5 CodeCoins 🎉';});}}
    else{const a=sel;a.classList.add('shake');b.classList.add('shake');setTimeout(()=>{a.classList.remove('shake');b.classList.remove('shake');},360);a.classList.remove('sel');sel=null;msg.style.color='var(--pink)';msg.textContent='Quase! Tenta de novo.';}
  }
}
function switchTab(t){
  document.querySelectorAll('.snav').forEach(n=>n.classList.toggle('on',n.dataset.tab===t));
  ['mat','rec','des','ing','atv'].forEach(k=>{const p=$('#pane-'+k);if(p)p.classList.toggle('on',k===t);});
}

/* ---- economia: CodeCoin / CodeGem ---- */
function walletSet(coins,gems){
  if(coins!=null)$('#lCoins').textContent=coins;
  if(gems!=null)$('#lGems').textContent=gems;
}
async function walletRefresh(){
  const p=await window.cqAuth.getProfile();
  if(p)walletSet(p.coins||0,p.gems||0);
}
async function tryAward(fn,args){
  try{
    const {data,error}=await window.sb.rpc(fn,args);
    if(!error&&data===true){await walletRefresh();return true;}
  }catch(e){}
  return false;
}
const AWARDED_PAGES=new Set();
function awardCurrentPage(){
  if(!LESSON)return;
  if(!AWARDED_PAGES.has(PIDX)){
    AWARDED_PAGES.add(PIDX);
    tryAward('award_page',{p_lesson_id:LESSON.id,p_page:PIDX});
  }
  if(PAGES[PIDX]&&PAGES[PIDX].kind==='seal'){
    tryAward('award_material',{p_lesson_id:LESSON.id});
  }
}

/* ---- aba Atividade: checklist prático da aula (vale CodeCoins) ---- */
function renderActivity(){
  const steps=PAGES.filter(p=>p.kind==='content'&&p.cls==='t-passo').map(p=>p.title);
  if(!steps.length){$('#pane-atv').innerHTML='<div class="m-p">Atividade em breve.</div>';return;}
  const key='cq_atv_'+(LESSON?LESSON.id:'');
  let done=[];try{done=JSON.parse(localStorage.getItem(key))||[];}catch(e){}
  let h='<div class="m-h" style="margin-top:0">Atividade prática</div>'+
    '<div class="m-p">Faça na plataforma e marque cada passo que você completou de verdade. Tudo marcado = <b>+5</b> <img src="assets/shop/codecoin.svg" style="width:14px;height:14px;vertical-align:-2px"> CodeCoins!</div><div class="chal-box">';
  steps.forEach((s,i)=>{h+='<label class="chal-step" style="cursor:pointer"><input type="checkbox" data-atv="'+i+'" '+(done.includes(i)?'checked':'')+' style="margin-right:4px"> '+esc(s)+'</label>';});
  h+='</div><div class="eng-msg" id="atvMsg"></div>';
  $('#pane-atv').innerHTML=h;
  document.querySelectorAll('[data-atv]').forEach(c=>c.onchange=async()=>{
    const marked=[...document.querySelectorAll('[data-atv]:checked')].map(x=>+x.dataset.atv);
    try{localStorage.setItem(key,JSON.stringify(marked));}catch(e){}
    if(marked.length===steps.length){
      const novo=await tryAward('award_activity',{p_lesson_id:LESSON.id,p_kind:'pratica'});
      const m=$('#atvMsg');m.style.color='#059669';
      m.textContent=novo?'Atividade completa! +5 CodeCoins 🎉':'Atividade completa! (recompensa já recebida)';
    }
  });
}

let LESSON=null;
async function completeChallenge(){
  const btn=$('#btnDone');if(!btn||btn.classList.contains('done'))return;
  btn.disabled=true;
  const {error}=await window.sb.rpc('finish_challenge',{p_lesson_id:LESSON.id});
  if(error){btn.disabled=false;alert('Erro: '+error.message);return;}
  btn.classList.add('done');btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L19 7"/></svg> Desafio concluído! +2 💎';
  $('#progFill').style.width='100%';$('#progTxt').textContent='Concluída';
  await walletRefresh();
}

async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){$('#loading').textContent='Aula não encontrada.';return;}
  const prof=await window.cqAuth.getProfile();
  if(prof)walletSet(prof.coins||0,prof.gems||0);
  const {data:lesson,error}=await window.sb.from('lessons').select('*, module:modules(title,tool)').eq('id',id).single();
  if(error||!lesson){$('#loading').textContent='Não foi possível carregar a aula.';return;}
  LESSON=lesson;
  const body=lesson.body||{};
  $('#lTitle').textContent=lesson.title;
  const tags=[];if(lesson.module&&lesson.module.tool)tags.push(lesson.module.tool);if(lesson.tool&&lesson.tool!==(lesson.module&&lesson.module.tool))tags.push(lesson.tool);
  $('#lTags').innerHTML=tags.map(t=>'<span class="l-tag tag-'+t+'">'+t.toUpperCase()+'</span>').join('');
  initPager(body.material,body.intro,lesson.title);
  renderActivity();
  $('#pane-rec').innerHTML=renderResources(body.resources);
  $('#pane-des').innerHTML=renderChallenge(body.challenge,lesson.reward_coins);
  $('#pane-ing').innerHTML=renderEnglish(body.english);
  document.querySelectorAll('.snav').forEach(n=>n.onclick=()=>switchTab(n.dataset.tab));
  if(body.english)initEnglish(body.english);
  const bd=$('#btnDone');if(bd)bd.onclick=completeChallenge;
  const {data:prog}=await window.sb.from('lesson_progress').select('status').eq('lesson_id',id).maybeSingle();
  if(prog&&prog.status==='completed'){$('#progFill').style.width='100%';$('#progTxt').textContent='Concluída';const b=$('#btnDone');if(b){b.classList.add('done');b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L19 7"/></svg> Desafio concluído!';}}
  else{$('#progFill').style.width='33%';}
  $('#sealFoot').innerHTML=devSeal(false);
  $('#loading').style.display='none';$('#lesson').style.display='block';
}
load();
</script>
