<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&family=Pacifico&family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--bg:#EEF4FB;--paper:#FFFDF8;--paper-line:#E8E4DF;--paper-margin:#FFB3C6;--pink:#FF6B9D;--pink-soft:#FFE4EE;--pink-hover:#FF4F88;--blue:#6DBDE8;--blue-soft:#E3F2FD;--blue-deep:#4A9BC7;--lavender:#C4B5FD;--lavender-soft:#F0ECFF;--mint:#A7F3D0;--mint-soft:#ECFDF5;--gold:#E0A93C;--gold-soft:#FFF3D6;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--border:#E2E8F0;--line-h:32px;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);--shadow-hover:0 2px 8px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.05);--postit-yellow:#FFF9C4;--postit-pink:#FFE4EE;--postit-mint:#D1FAE5;--postit-peach:#FFE5D9;--postit-lilac:#EDE7F6;--postit-sky:#E0F2FE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Kalam','Caveat',cursive;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-weight:500;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.pixel{font-family:'Press Start 2P',monospace}
.nb{background:var(--paper);border:1px solid #E5E0DA;border-radius:var(--radius);box-shadow:var(--shadow);transition:all .2s;position:relative}
.nb:hover{box-shadow:var(--shadow-hover)}
.nb-body{background-image:repeating-linear-gradient(var(--paper) 0px,var(--paper) calc(var(--line-h) - 1px),var(--paper-line) calc(var(--line-h) - 1px),var(--paper-line) var(--line-h));background-size:100% var(--line-h);padding:14px 22px 18px 52px;position:relative;min-height:60px}
.nb-body::before{content:'';position:absolute;top:0;left:40px;width:2px;height:100%;background:var(--paper-margin);opacity:.5;z-index:0}
.nb-holes{position:absolute;top:0;left:0;width:32px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;z-index:2;pointer-events:none}
.nb-hole{width:14px;height:14px;border-radius:50%;background:var(--bg);border:1px solid #D4CFC9;box-shadow:inset 0 1px 2px rgba(0,0,0,.08);flex-shrink:0}
.nb-header{background:var(--paper);padding:14px 22px 8px 52px;display:flex;align-items:center;gap:10px;position:relative;border-radius:var(--radius) var(--radius) 0 0}
.nb-header::before{content:'';position:absolute;top:0;left:40px;width:2px;height:100%;background:var(--paper-margin);opacity:.5}
.nb-header h2{font-size:22px;font-weight:700;color:var(--text);flex:1}
.nb-tag{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 8px;border-radius:4px;letter-spacing:.5px}
.tag-pink{background:var(--pink-soft);color:var(--pink)}.tag-blue{background:var(--blue-soft);color:var(--blue-deep)}.tag-lav{background:var(--lavender-soft);color:#7C3AED}.tag-gold{background:var(--gold-soft);color:#B07D17}
.px-div{height:2px;margin:10px 0;background:repeating-linear-gradient(90deg,var(--paper-line) 0 4px,transparent 4px 8px)}
.postit-btn{font-family:'Kalam','Caveat',cursive;font-weight:600;border:none;border-radius:3px;cursor:pointer;transition:all .15s ease;box-shadow:0 2px 4px rgba(0,0,0,.08)}
.postit-btn:hover{transform:translateY(-1px)}.postit-btn:active{transform:translateY(1px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
#hub{min-height:100vh;padding-bottom:40px;animation:fadeUp .5s ease}
.hub-header{padding:28px 32px 20px;max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hub-logo{display:flex;align-items:center;gap:12px}
.hub-logo-pixel{width:30px;height:30px;display:grid;grid-template-columns:repeat(5,1fr);gap:0}
.hp{width:100%;aspect-ratio:1}.hp.p{background:var(--pink)}.hp.t{background:transparent}
.hub-logo-text h1{font-size:24px;font-family:'Kalam','Caveat',cursive;font-weight:700;color:var(--text);line-height:1}
.hub-logo-text span{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--text-light);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hub-date{font-size:16px;color:var(--text-mid);display:flex;align-items:center;gap:8px}
.hub-date .pixel-dot{width:6px;height:6px;background:var(--pink);border-radius:1px}
.home-btn,.theme-toggle,.profile-trigger{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border:1px solid #E5E0DA;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.home-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:14px;color:var(--pink);transition:all .2s;cursor:pointer}
.home-btn:hover{background:var(--pink);color:#fff;transform:translateY(-1px)}
.theme-toggle{display:flex;align-items:center;gap:4px;border-radius:20px;padding:5px 8px}
.theme-toggle-opt{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:transparent;transition:all .2s;cursor:pointer;color:var(--text-light)}
.theme-toggle-opt:hover{color:var(--text);background:var(--blue-soft)}
.theme-toggle-opt.active{background:var(--pink);color:#fff;box-shadow:0 2px 8px rgba(255,107,157,.3)}
.retro-pill{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--pink);background:var(--pink-soft);border:none;padding:9px 11px;border-radius:8px;cursor:pointer;transition:all .15s}
.retro-pill:hover{background:var(--pink);color:#fff}
.profile-trigger{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 14px;border-radius:16px;transition:all .15s}
.profile-trigger:hover{background:var(--pink);border-color:var(--pink)}
.profile-trigger:hover .profile-name{color:#fff}
.profile-avatar{width:22px;height:22px;color:var(--pink)}
.profile-trigger:hover .profile-avatar{color:#fff}
.profile-name{font-size:15px;font-weight:600;color:var(--text)}
.hub-container{max-width:1200px;margin:0 auto;padding:0 24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--paper);border:1px solid #E5E0DA;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:all .2s;display:flex;align-items:center;gap:14px;background-image:repeating-linear-gradient(var(--paper) 0px,var(--paper) 27px,var(--paper-line) 27px,var(--paper-line) 28px)}
.stat:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:22px;height:22px}
.stat-icon.pink{background:var(--pink-soft);color:var(--pink)}.stat-icon.blue{background:var(--blue-soft);color:var(--blue-deep)}.stat-icon.lav{background:var(--lavender-soft);color:#7C3AED}.stat-icon.gold{background:var(--gold-soft);color:var(--gold)}
.stat-num{font-size:26px;font-weight:700;color:var(--text);line-height:1.1}
.stat-label{font-size:14px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card-full{grid-column:1/-1}
.timer-modes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tm-btn{font-size:15px;padding:6px 14px;background:var(--postit-yellow);color:var(--text)}.tm-btn.on{background:var(--pink);color:#fff}
.timer-num{text-align:center;font-size:54px;font-family:'Kalam','Caveat',cursive;font-weight:700;color:var(--text);letter-spacing:-2px;padding:6px 0;font-variant-numeric:tabular-nums}
.timer-status{text-align:center;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);letter-spacing:2px;margin-bottom:12px}
.timer-btns{display:flex;gap:8px;justify-content:center}
.t-start{font-size:16px;padding:10px 32px;background:var(--postit-pink);color:var(--pink-hover)}
.t-reset{font-size:16px;padding:10px 24px;background:var(--postit-mint);color:#059669}
.goal-tabs{display:flex;gap:6px;margin-bottom:10px}
.goal-tab{font-size:14px;padding:5px 12px;background:var(--postit-peach);color:var(--text-mid)}.goal-tab.on{background:var(--postit-lilac);color:#7C3AED}
.goal-input-row{display:flex;gap:8px;margin-bottom:12px}
.goal-input-row input{flex:1;font-family:'Kalam','Caveat',cursive;font-size:16px;padding:8px 14px;border:1px solid var(--paper-line);border-radius:6px;background:rgba(255,255,255,.8);color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
.goal-input-row input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(109,189,232,.15)}
.goal-input-row input::placeholder{color:var(--text-light)}
.goal-add-btn{font-family:'Kalam','Caveat',cursive;width:42px;height:42px;padding:0;background:var(--postit-sky);color:var(--blue-deep);border:2px solid var(--blue);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.goal-add-btn svg{width:20px;height:20px}
.goal-add-btn:hover{background:var(--blue-soft);transform:translateY(-1px)}.goal-add-btn:active{background:var(--blue);color:#fff;transform:scale(.95)}
.goal-row{display:flex;align-items:center;gap:10px;padding:3px 2px;min-height:var(--line-h);line-height:var(--line-h);font-size:16px;color:var(--text);animation:slideIn .25s ease;transition:all .2s}
.goal-row:hover{background:rgba(255,107,157,.04);border-radius:4px}
.goal-row.done .glabel{opacity:.4;text-decoration:line-through}
.gchk{width:20px;height:20px;min-width:20px;border-radius:5px;border:2px solid var(--paper-line);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;transition:all .2s}
.gchk svg{width:12px;height:12px}
.gchk:hover{border-color:var(--pink);transform:scale(1.1)}
.goal-row.done .gchk{background:var(--pink);border-color:var(--pink);color:#fff}
.glabel{flex:1;cursor:pointer}.gx{margin-left:auto;cursor:pointer;color:var(--text-light);opacity:0;padding:2px 6px;transition:all .15s;border-radius:3px;display:flex}
.gx svg{width:15px;height:15px}
.goal-row:hover .gx{opacity:.5}.gx:hover{opacity:1!important;color:#fff!important;background:var(--pink)}
.goal-empty{text-align:center;padding:24px 0;color:var(--text-light);font-size:15px;opacity:.5}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.note-card{padding:14px;border-radius:4px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:all .2s;min-height:96px;position:relative;animation:popIn .25s ease;transform:rotate(var(--rot,0deg));display:flex;flex-direction:column}
.note-card:hover{transform:translateY(-3px) rotate(var(--rot,0deg))!important;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.note-card-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.note-card-preview{font-size:14px;color:var(--text-mid);line-height:1.3;flex:1}
.note-card-date{font-size:10px;color:var(--text-light);margin-top:8px;font-family:'Press Start 2P',monospace;letter-spacing:.5px}
.note-card-del{position:absolute;top:5px;right:7px;color:var(--text-light);cursor:pointer;opacity:0;transition:all .15s;padding:2px;border-radius:3px;display:flex}
.note-card-del svg{width:15px;height:15px}
.note-card:hover .note-card-del{opacity:.5}.note-card-del:hover{opacity:1!important;color:#fff;background:var(--pink)}
.note-add-card{border:2px dashed var(--paper-line);background:rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;min-height:96px;border-radius:4px;color:var(--text-light)}
.note-add-card:hover{border-color:var(--pink);background:var(--pink-soft);transform:translateY(-2px);color:var(--pink)}
.note-add-card svg{width:26px;height:26px}.note-add-card small{font-size:13px}
.fc-deck-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.fc-deck-tab{font-family:'Kalam','Caveat',cursive;font-size:15px;font-weight:600;padding:6px 16px;background:var(--postit-yellow);color:var(--text-mid);border:none;border-radius:4px;cursor:pointer;transition:all .15s}
.fc-deck-tab.on{background:var(--postit-pink);color:var(--pink)}
.fc-deck-tab:hover:not(.on){transform:translateY(-1px)}
.fc-deck-new{font-family:'Kalam','Caveat',cursive;font-size:14px;padding:6px 12px;background:rgba(255,255,255,.4);color:var(--text-light);border:1px dashed var(--paper-line);border-radius:4px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.fc-deck-new svg{width:14px;height:14px}
.fc-deck-new:hover{border-color:var(--pink);color:var(--pink)}
.fc-lesson{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px dashed var(--paper-line);font-size:16px}
.fc-lesson:last-child{border-bottom:none}
.fc-lesson .fc-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--blue-soft);color:var(--blue-deep)}
.fc-lesson .fc-ic svg{width:18px;height:18px}
.fc-lesson-info{flex:1}.fc-lesson-info b{font-weight:700;color:var(--text)}.fc-lesson-info small{display:block;font-size:13px;color:var(--text-light)}
.fc-lesson .reward{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);background:var(--gold-soft);padding:5px 8px;border-radius:4px}
.hub-footer{text-align:center;padding:32px 20px 16px;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--text-light);letter-spacing:2px;opacity:.5}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.hub-header{flex-direction:column;gap:12px;text-align:center}}
[data-theme="dark"]{--bg:#1E1A2E;--paper:#2A2435;--paper-line:#3D3548;--paper-margin:#5C3D5E;--pink:#FF7EB3;--pink-soft:rgba(255,126,179,.12);--pink-hover:#FF99C8;--blue:#7EC8F5;--blue-soft:rgba(126,200,245,.1);--blue-deep:#A8D8F0;--lavender:#B8A9F0;--lavender-soft:rgba(184,169,240,.1);--mint:#6EE7B7;--mint-soft:rgba(110,231,183,.08);--gold:#F0C674;--gold-soft:rgba(240,198,116,.12);--text:#E8E0F0;--text-mid:#9B8FAA;--text-light:#6B6580;--postit-yellow:#3D3520;--postit-pink:#3A1E2E;--postit-mint:#1A3328;--postit-peach:#3A2A1E;--postit-lilac:#2A2440;--postit-sky:#1A2A3A}
[data-theme="dark"] body{background:#1E1A2E}
[data-theme="dark"] .home-btn,[data-theme="dark"] .theme-toggle,[data-theme="dark"] .profile-trigger{background:rgba(42,36,53,.85);border-color:var(--paper-line)}
[data-theme="dark"] .goal-input-row input{background:#332D40}
[data-theme="dark"] .note-add-card{background:rgba(42,36,53,.6);border-color:var(--paper-line)}
[data-theme="dark"] .gchk{background:#332D40;border-color:#443D52}
/* ===== ESTÉTICA MESA DE MADEIRA (igual ao RetroMynd Study Hub) ===== */
body{background:repeating-linear-gradient(2deg,transparent,transparent 18px,rgba(139,90,43,0.04) 18px,rgba(139,90,43,0.04) 19px),repeating-linear-gradient(-1deg,transparent,transparent 32px,rgba(101,67,33,0.03) 32px,rgba(101,67,33,0.03) 33px),repeating-linear-gradient(1.5deg,transparent,transparent 60px,rgba(139,90,43,0.025) 60px,rgba(160,110,60,0.025) 62px),linear-gradient(165deg,#F5E6D3 0%,#EDD9C0 25%,#E8D0B3 50%,#ECDCC8 75%,#F0E2D0 100%)!important;background-attachment:fixed!important}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(38deg,transparent 22%,rgba(101,67,33,0.06) 22.2%,rgba(101,67,33,0.04) 22.4%,transparent 22.6%,transparent 48%,rgba(120,80,40,0.05) 48.1%,rgba(120,80,40,0.03) 48.3%,transparent 48.5%,transparent 73%,rgba(101,67,33,0.05) 73.1%,rgba(101,67,33,0.03) 73.3%,transparent 73.5%),linear-gradient(85deg,transparent 35%,rgba(90,60,30,0.04) 35.1%,transparent 35.3%,transparent 67%,rgba(90,60,30,0.035) 67.1%,transparent 67.3%),linear-gradient(155deg,transparent 15%,rgba(80,50,20,0.04) 15.1%,transparent 15.25%,transparent 55%,rgba(80,50,20,0.035) 55.1%,transparent 55.2%,transparent 82%,rgba(100,65,30,0.04) 82.05%,transparent 82.2%),radial-gradient(ellipse 40px 35px at 85% 30%,rgba(120,75,35,0.06) 0%,transparent 100%),radial-gradient(ellipse 25px 20px at 12% 70%,rgba(110,70,30,0.05) 0%,transparent 100%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(101,67,33,0.08) 100%)}
#hub{position:relative;z-index:1}
.nb-body{background-image:none!important;background:var(--paper)!important}
.stat{background-image:none!important;background:var(--paper)!important}
.nb-body::before,.nb-header::before{display:none!important;background:none!important;width:0!important}
.nb-holes{display:none!important}
.nb{border-left:3px solid rgba(139,90,43,0.12)!important}
[data-theme="dark"] body{background:repeating-linear-gradient(2deg,transparent,transparent 18px,rgba(60,35,15,0.08) 18px,rgba(60,35,15,0.08) 19px),repeating-linear-gradient(-1deg,transparent,transparent 32px,rgba(50,30,12,0.06) 32px,rgba(50,30,12,0.06) 33px),repeating-linear-gradient(1.5deg,transparent,transparent 60px,rgba(70,40,18,0.05) 60px,rgba(70,40,18,0.05) 62px),linear-gradient(165deg,#2C1E14 0%,#261A10 25%,#22170E 50%,#281C12 75%,#2E2016 100%)!important;background-attachment:fixed!important}
[data-theme="dark"] body::before{background:linear-gradient(38deg,transparent 22%,rgba(200,170,130,0.04) 22.2%,transparent 22.6%,transparent 48%,rgba(200,170,130,0.03) 48.1%,transparent 48.5%,transparent 73%,rgba(200,170,130,0.035) 73.1%,transparent 73.5%),linear-gradient(85deg,transparent 35%,rgba(180,150,110,0.03) 35.1%,transparent 35.3%,transparent 67%,rgba(180,150,110,0.025) 67.1%,transparent 67.3%),radial-gradient(ellipse 40px 35px at 85% 30%,rgba(80,55,25,0.08) 0%,transparent 100%),radial-gradient(ellipse 25px 20px at 12% 70%,rgba(70,45,20,0.06) 0%,transparent 100%)!important}
[data-theme="dark"] body::after{background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.15) 100%)!important}
[data-theme="dark"] .nb-body,[data-theme="dark"] .stat{background-image:none!important}
[data-theme="dark"] .nb{border-left:3px solid rgba(200,170,130,0.1)!important}
/* ===== TEMA RETRO (portado do RetroMynd Study Hub) ===== */
body.retro-dark{--rbg:#0d1f3c;--rsurface:#0a1628;--rcard:#112244;--rborder:#1e3a6e;--rpixel:#e8f0ff;--rdim:#7a8faa;--rpink:#e8477a;--rgold:#f5c518;--rsky:#7ec8f5;--rshadow:rgba(0,0,0,.4);--rscanline:rgba(0,0,0,.04);--rgold-glow:rgba(245,197,24,.4)}
body.retro-light{--rbg:#f0ebe3;--rsurface:#e6dfd5;--rcard:#fffef7;--rborder:#1e3a6e;--rpixel:#0d1f3c;--rdim:#5a6a7e;--rpink:#d63a6a;--rgold:#b8860b;--rsky:#1a5ea8;--rshadow:rgba(30,58,110,.15);--rscanline:rgba(0,0,0,.015);--rgold-glow:rgba(184,134,11,.25)}
body.retro-dark *,body.retro-light *{font-family:'Space Mono',monospace!important}
body.retro-dark h1,body.retro-dark h2,body.retro-dark h3,body.retro-dark h4,body.retro-light h1,body.retro-light h2,body.retro-light h3,body.retro-light h4{font-family:'VT323',monospace!important}
body.retro-dark,body.retro-light{background:var(--rbg)!important;color:var(--rpixel)!important;transition:background .4s ease,color .4s ease}
body.retro-dark::before,body.retro-light::before{display:none!important;background:none!important}
body.retro-dark::after,body.retro-light::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:99999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--rscanline) 2px,var(--rscanline) 4px)}
body.retro-dark ::selection,body.retro-light ::selection{background:var(--rgold);color:#000}

body.retro-dark .glabel,body.retro-light .glabel,body.retro-dark .note-card-title,body.retro-light .note-card-title,body.retro-dark .note-card-preview,body.retro-light .note-card-preview,body.retro-dark .fc-lesson-info b,body.retro-light .fc-lesson-info b,body.retro-dark .hub-date,body.retro-light .hub-date,body.retro-dark .profile-name,body.retro-light .profile-name{color:var(--rpixel)!important}
body.retro-dark .note-card-date,body.retro-light .note-card-date,body.retro-dark .fc-lesson-info small,body.retro-light .fc-lesson-info small,body.retro-dark .goal-empty,body.retro-light .goal-empty,body.retro-dark .hub-footer,body.retro-light .hub-footer,body.retro-dark .hub-logo-text span,body.retro-light .hub-logo-text span{color:var(--rdim)!important}
body.retro-dark .postit-btn,body.retro-light .postit-btn,body.retro-dark .theme-toggle-opt,body.retro-light .theme-toggle-opt,body.retro-dark .goal-add-btn,body.retro-light .goal-add-btn,body.retro-dark .fc-deck-new,body.retro-light .fc-deck-new,body.retro-dark .retro-pill,body.retro-light .retro-pill{background:var(--rsurface)!important;border:2px solid var(--rborder)!important;color:var(--rpixel)!important;border-radius:0!important;box-shadow:none!important;font-weight:700!important}

<body>
<div id="hub">
  <header class="hub-header">
    <div class="hub-logo">
      <div class="hub-logo-pixel">
        <span class="hp t"></span><span class="hp p"></span><span class="hp t"></span><span class="hp p"></span><span class="hp t"></span>
        <span class="hp p"></span><span class="hp p"></span><span class="hp p"></span><span class="hp p"></span><span class="hp p"></span>
        <span class="hp p"></span><span class="hp p"></span><span class="hp p"></span><span class="hp p"></span><span class="hp p"></span>
        <span class="hp t"></span><span class="hp p"></span><span class="hp p"></span><span class="hp p"></span><span class="hp t"></span>
        <span class="hp t"></span><span class="hp t"></span><span class="hp p"></span><span class="hp t"></span><span class="hp t"></span>
      </div>
      <div class="hub-logo-text"><h1>Code Quest</h1><span>CODE ACADEMY</span></div>
    </div>
    <div class="header-right">
      <div class="hub-date"><span class="pixel-dot"></span><span id="dateTxt">—</span></div>
      <div class="home-btn" title="Sair" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
      </div>
      <div class="theme-toggle" id="themeToggle">
        <button class="theme-toggle-opt active" data-t="light" title="Claro"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg></button>
        <button class="theme-toggle-opt" data-t="system" title="Sistema"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg></button>
        <button class="theme-toggle-opt" data-t="dark" title="Escuro"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z"/></svg></button>
      </div>
      <button class="retro-pill" onclick="toggleRetro()">RETRO</button>
      <div class="profile-trigger" onclick="logout()">
        <svg class="profile-avatar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        <span class="profile-name" id="profileName">aluno</span>
      </div>
    </div>
  </header>

  <div class="hub-container">
    <div class="stats">
      <div class="stat">
        <div class="stat-icon pink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3 4 4 4 8a4 4 0 0 1-8 0c0-1.5.6-2.3 1.3-3 .2 1 .8 1.6 1.7 1.6 0-3-.5-5 1-6.6Z"/></svg></div>
        <div><div class="stat-num" id="stStreak">4</div><div class="stat-label">Sequência</div></div>
      </div>
      <div class="stat">
        <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg></div>
        <div><div class="stat-num" id="stProjects">3</div><div class="stat-label">Projetos</div></div>
      </div>
      <div class="stat">
        <div class="stat-icon lav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg></div>
        <div><div class="stat-num" id="stMissions">0/0</div><div class="stat-label">Missões</div></div>
      </div>
      <div class="stat">
        <div class="stat-icon gold"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9.5" opacity=".25"/><circle cx="12" cy="12" r="7.5"/><path d="M12 8.4l1.1 2.3 2.5.4-1.8 1.8.4 2.5L12 16.2l-2.2 1.2.4-2.5-1.8-1.8 2.5-.4z" fill="#fff"/></svg></div>
        <div><div class="stat-num" id="stCoins">240</div><div class="stat-label">Moedas</div></div>
      </div>
    </div>

    <div class="grid">
      <div class="nb">
        <div class="nb-header"><h2>Timer de Foco</h2><span class="nb-tag tag-pink">FOCO</span></div>
        <div class="nb-body">
          <div class="nb-holes"><div class="nb-hole"></div><div class="nb-hole"></div><div class="nb-hole"></div></div>
          <div class="timer-modes">
            <button class="postit-btn tm-btn on" data-min="25">25 min</button>
            <button class="postit-btn tm-btn" data-min="50">50 min</button>
            <button class="postit-btn tm-btn" data-min="5">Pausa 5</button>
            <button class="postit-btn tm-btn" data-min="15">Pausa 15</button>
          </div>
          <div class="timer-num" id="timerNum">25:00</div>
          <div class="timer-status" id="timerStatus">MODO FOCO</div>
          <div class="timer-btns">
            <button class="postit-btn t-start" id="tStart" onclick="toggleTimer()">Iniciar</button>
            <button class="postit-btn t-reset" onclick="resetTimer()">Reset</button>
          </div>
        </div>
      </div>

      <div class="nb">
        <div class="nb-header"><h2>Missões do Dia</h2><span class="nb-tag tag-lav">DIÁRIO</span></div>
        <div class="nb-body">
          <div class="nb-holes"><div class="nb-hole"></div><div class="nb-hole"></div><div class="nb-hole"></div></div>
          <div class="goal-tabs"><button class="goal-tab on">Hoje</button><button class="goal-tab" onclick="alert('Histórico em breve!')">Histórico</button></div>
          <div class="goal-input-row">
            <input id="missionInput" type="text" placeholder="Escreva uma missão..." onkeydown="if(event.key==='Enter')addMission()">
            <button class="goal-add-btn" onclick="addMission()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
          <div id="missionList"></div>
        </div>
      </div>
    </div>

    <div class="nb card-full">
      <div class="nb-header"><h2>Meus Projetos</h2><span class="nb-tag tag-blue">PROJETOS</span></div>
      <div class="nb-body">
        <div class="nb-holes"><div class="nb-hole"></div><div class="nb-hole"></div><div class="nb-hole"></div></div>
        <div class="notes-grid" id="projectGrid"></div>
      </div>
    </div>

    <div class="nb card-full" style="margin-top:16px">
      <div class="nb-header"><h2>Lições de código</h2><span class="nb-tag tag-gold">LIÇÕES</span></div>
      <div class="nb-body">
        <div class="nb-holes"><div class="nb-hole"></div><div class="nb-hole"></div><div class="nb-hole"></div></div>
        <div class="fc-deck-tabs" id="deckTabs"></div>
        <div id="lessonList"></div>
      </div>
    </div>
  </div>
  <div class="hub-footer">CODE QUEST · AULAS COM O PROF. MATH</div>
</div>

<script>
const $=(s)=>document.querySelector(s);
const get=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}};
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

(function(){
  const d=new Date();
  const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  $('#dateTxt').textContent=`${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
})();
async function logout(){ await window.cqAuth.signOut(); localStorage.removeItem('cq_user'); location.href='login.html'; }

// Moedas (Fase 1: exibe valor do banco; persistência server-side entra na Fase 2)
let coins=0;
function renderCoins(){$('#stCoins').textContent=coins;}
function addCoins(n){coins+=n;renderCoins();}
renderCoins();
// Carrega o perfil do aluno logado do Supabase
async function loadProfile(){
  try{
    await window.sb.rpc('touch_streak');
    const prof = await window.cqAuth.getProfile();
    if(prof){
      $('#profileName').textContent = prof.display_name || 'aluno';
      coins = prof.coins || 0; renderCoins();
      $('#stStreak').textContent = prof.streak || 0;
    }
  }catch(e){ console.warn('perfil', e); }
}
loadProfile();

const tt=$('#themeToggle');
let retroOn=get('cq_retro',false);
function isDark(t){return t==='dark' || (t==='system' && matchMedia('(prefers-color-scheme:dark)').matches);}
function applyRetro(){
  const dark=isDark(get('cq_theme','light'));
  document.body.classList.remove('retro-dark','retro-light');
  if(retroOn)document.body.classList.add(dark?'retro-dark':'retro-light');
  const pill=document.querySelector('.retro-pill');
  if(pill)pill.textContent=retroOn?'COMFY':'RETRO';
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', isDark(t)?'dark':'light');
  tt.querySelectorAll('.theme-toggle-opt').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  set('cq_theme',t);
  applyRetro();
}
function toggleRetro(){retroOn=!retroOn;set('cq_retro',retroOn);applyRetro();}
tt.querySelectorAll('.theme-toggle-opt').forEach(b=>b.onclick=()=>applyTheme(b.dataset.t));
applyTheme(get('cq_theme','light'));

let tMin=25,tLeft=25*60,tRun=false,tInt=null;
function fmt(s){const m=Math.floor(s/60),x=s%60;return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`;}
function renderTimer(){$('#timerNum').textContent=fmt(tLeft);}
document.querySelectorAll('.tm-btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tm-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  tMin=+b.dataset.min;tLeft=tMin*60;tRun=false;clearInterval(tInt);$('#tStart').textContent='Iniciar';
  $('#timerStatus').textContent=(tMin<=15?'PAUSA':'MODO FOCO');renderTimer();
});
function toggleTimer(){
  if(tRun){tRun=false;clearInterval(tInt);$('#tStart').textContent='Iniciar';return;}
  tRun=true;$('#tStart').textContent='Pausar';
  tInt=setInterval(()=>{if(tLeft>0){tLeft--;renderTimer();}else{clearInterval(tInt);tRun=false;$('#tStart').textContent='Iniciar';$('#timerStatus').textContent='CONCLUÍDO! +20';awardFocus();}},1000);
}
function resetTimer(){tRun=false;clearInterval(tInt);tLeft=tMin*60;$('#tStart').textContent='Iniciar';$('#timerStatus').textContent=(tMin<=15?'PAUSA':'MODO FOCO');renderTimer();}
renderTimer();

async function awardFocus(){try{const {data}=await window.sb.rpc('award_focus_coins');if(typeof data==='number'){coins=data;renderCoins();}}catch(e){}}

const checkSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L19 7"/></svg>';
const xSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>';
let missions=[];
function renderMissions(){
  const list=$('#missionList');
  if(!missions.length){list.innerHTML='<div class="goal-empty">Nenhuma missão hoje</div>';}
  else{
    list.innerHTML=missions.map(m=>`<div class="goal-row ${m.done?'done':''}">
      <span class="gchk" onclick="toggleMission('${m.id}')">${m.done?checkSvg:''}</span>
      <span class="glabel" onclick="toggleMission('${m.id}')">${esc(m.text)}</span>
      <span class="gx" onclick="delMission('${m.id}')">${xSvg}</span></div>`).join('');
  }
  const done=missions.filter(m=>m.done).length;
  $('#stMissions').textContent=`${done}/${missions.length}`;
}
async function loadMissions(){
  const {data}=await window.sb.from('missions').select('id,text,done').order('created_at');
  missions=data||[];renderMissions();
}
async function addMission(){
  const i=$('#missionInput');const v=i.value.trim();if(!v)return;i.value='';
  const {data,error}=await window.sb.from('missions').insert({text:v}).select('id,text,done').single();
  if(!error&&data){missions.push(data);renderMissions();}
}
async function toggleMission(id){
  const m=missions.find(x=>x.id===id);if(!m)return;
  const nd=!m.done;m.done=nd;renderMissions();
  await window.sb.rpc('complete_mission',{p_id:id,p_done:nd});
  if(nd){const p=await window.cqAuth.getProfile();if(p){coins=p.coins;renderCoins();}}
}
async function delMission(id){
  await window.sb.from('missions').delete().eq('id',id);
  missions=missions.filter(m=>m.id!==id);renderMissions();
}
loadMissions();

const pColors=['var(--postit-yellow)','var(--postit-sky)','var(--postit-pink)','var(--postit-mint)','var(--postit-lilac)','var(--postit-peach)'];
let projects=[];
const plusSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
function renderProjects(){
  const g=$('#projectGrid');
  const rots=['-1.5deg','1deg','-0.5deg','1.5deg','-1deg','0.5deg'];
  g.innerHTML=projects.map((p,i)=>`<div class="note-card" style="background:${pColors[(p.color||0)%pColors.length]};--rot:${rots[i%rots.length]}" onclick="editProject('${p.id}')">
      <span class="note-card-del" onclick="event.stopPropagation();delProject('${p.id}')">${xSvg}</span>
      <div class="note-card-title">${esc(p.title)}</div>
      <div class="note-card-preview">${esc(p.description||'')}</div>
      <div class="note-card-date">PROJETO</div></div>`).join('')
    +`<div class="note-add-card" onclick="addProject()">${plusSvg}<small>Novo projeto</small></div>`;
  $('#stProjects').textContent=projects.length;
}
async function loadProjects(){
  const {data}=await window.sb.from('projects').select('id,title,description,color').order('created_at');
  projects=data||[];renderProjects();
}
async function addProject(){
  const t=prompt('Nome do projeto:');if(!t)return;const d=prompt('Descrição (opcional):')||'';
  const {data,error}=await window.sb.from('projects').insert({title:t.trim(),description:d,color:projects.length%pColors.length}).select('id,title,description,color').single();
  if(!error&&data){projects.push(data);renderProjects();}
}
async function editProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  const t=prompt('Editar nome:',p.title);if(t===null)return;
  const d=prompt('Editar descrição:',p.description||'');if(d===null)return;
  await window.sb.from('projects').update({title:t.trim()||p.title,description:d}).eq('id',id);
  p.title=t.trim()||p.title;p.description=d;renderProjects();
}
async function delProject(id){
  if(!confirm('Excluir este projeto?'))return;
  await window.sb.from('projects').delete().eq('id',id);
  projects=projects.filter(x=>x.id!==id);renderProjects();
}
loadProjects();

const toolIcon={piskel:'<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/>',scratch:'<path d="M9 7l-5 5 5 5M15 7l5 5-5 5"/>',roblox:'<rect x="5" y="5" width="14" height="14" rx="2"/><rect x="9.5" y="9.5" width="5" height="5"/>',magicvoxel:'<path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M12 12l9-5M12 12v10M12 12L3 7"/>',construct:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>'};
const checkIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L19 7"/></svg>';
async function loadLessons(){
  const list=$('#lessonList'), tabs=$('#deckTabs');
  list.innerHTML='<div class="goal-empty" style="opacity:.6">Carregando aulas…</div>';
  const {data:modules,error}=await window.sb.from('modules').select('id,title,tool,position,lessons(id,title,description,tool,position,reward_coins)').eq('is_published',true).order('position');
  if(error){list.innerHTML='<div class="goal-empty">Erro ao carregar aulas</div>';return;}
  const {data:prog}=await window.sb.from('lesson_progress').select('lesson_id,status');
  const done=new Set((prog||[]).filter(p=>p.status==='completed').map(p=>p.lesson_id));
  if(!modules||!modules.length){tabs.innerHTML='';list.innerHTML='<div class="goal-empty">Nenhuma aula ainda</div>';return;}
  modules.forEach(m=>(m.lessons||[]).sort((a,b)=>a.position-b.position));
  let active=0;
  function renderTabs(){
    tabs.innerHTML=modules.map((m,i)=>`<button class="fc-deck-tab ${i===active?'on':''}" data-i="${i}">${esc(m.title)}</button>`).join('');
    tabs.querySelectorAll('.fc-deck-tab').forEach(b=>b.onclick=()=>{active=+b.dataset.i;renderTabs();renderList();});
  }
  function renderList(){
    const m=modules[active], ls=m.lessons||[];
    if(!ls.length){list.innerHTML='<div class="goal-empty">Sem aulas neste módulo</div>';return;}
    list.innerHTML=ls.map(l=>{
      const ic=toolIcon[l.tool||m.tool]||toolIcon.scratch, isDone=done.has(l.id);
      return `<a class="fc-lesson" href="lesson.html?id=${l.id}" style="text-decoration:none;color:inherit;cursor:pointer">
        <span class="fc-ic" style="${isDone?'background:var(--mint-soft);color:#059669':''}">${isDone?checkIc:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>`}</span>
        <span class="fc-lesson-info"><b>${esc(l.title)}</b><small>${esc(l.description||'')}</small></span>
        <span class="reward">${isDone?'✓ feito':'+'+(l.reward_coins||0)}</span></a>`;
    }).join('');
  }
  renderTabs();renderList();
}
loadLessons();
</script>
